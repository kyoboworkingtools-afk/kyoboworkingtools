<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>회의록 관리</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f5f6fa;--surface:#fff;--surface2:#f0f1f6;--border:#e2e4ed;--border2:#d0d3e0;
    --text:#1a1d2e;--text2:#5a5f7a;--text3:#9095b0;
    --accent:#4361ee;--accent2:#3a0ca3;--accent-light:#eef0fd;
    --green:#2db87a;--green-light:#e8f8f1;--red:#e84855;--red-light:#fdeef0;
    --shadow:0 2px 12px rgba(67,97,238,0.08);--radius:12px;--radius2:8px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;}

  .header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 32px;height:60px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 1px 8px rgba(0,0,0,0.06);}
  .header-logo{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;}
  .header-title{font-size:16px;font-weight:700;}
  .header-sub{font-size:12px;color:var(--text3);}

  .container{max-width:960px;margin:0 auto;padding:32px 24px;}

  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:20px;}
  .card-header{padding:18px 22px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
  .card-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
  .card-icon.blue{background:var(--accent-light);}
  .card-icon.green{background:var(--green-light);}
  .card-title{font-size:14px;font-weight:600;}
  .card-desc{font-size:12px;color:var(--text3);margin-top:1px;}
  .card-body{padding:20px 22px;}

  .form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
  .form-label{font-size:12px;font-weight:600;color:var(--text2);}
  .form-input{border:1px solid var(--border2);border-radius:var(--radius2);padding:10px 13px;font-size:13px;font-family:'Noto Sans KR',sans-serif;color:var(--text);background:var(--surface);transition:border 0.15s;width:100%;}
  .form-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(67,97,238,0.1);}
  .form-textarea{resize:vertical;min-height:160px;line-height:1.7;}
  .form-textarea-sm{min-height:80px;}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:10px 20px;border-radius:var(--radius2);font-size:13px;font-weight:500;border:none;cursor:pointer;transition:all 0.18s;font-family:'Noto Sans KR',sans-serif;}
  .btn:disabled{opacity:0.45;cursor:not-allowed;}
  .btn-primary{background:var(--accent);color:#fff;}
  .btn-primary:hover:not(:disabled){background:#3150d6;box-shadow:0 2px 10px rgba(67,97,238,0.3);}
  .btn-green{background:var(--green);color:#fff;}
  .btn-green:hover:not(:disabled){background:#24a068;box-shadow:0 2px 10px rgba(45,184,122,0.3);}
  .btn-outline{background:var(--surface);color:var(--text);border:1px solid var(--border2);}
  .btn-outline:hover:not(:disabled){border-color:var(--accent);color:var(--accent);}
  .btn-full{width:100%;}

  /* AI 분석 상태 */
  .status-box{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:var(--radius2);margin-bottom:14px;font-size:13px;font-weight:500;}
  .status-box.idle{background:var(--surface2);color:var(--text3);border:1px solid var(--border);}
  .status-box.loading{background:var(--accent-light);color:var(--accent);border:1px solid rgba(67,97,238,0.2);}
  .status-box.done{background:var(--green-light);color:var(--green);border:1px solid rgba(45,184,122,0.2);}
  .status-box.error{background:var(--red-light);color:var(--red);border:1px solid rgba(232,72,85,0.2);}
  .spin{animation:spin 1s linear infinite;display:inline-block;}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* 결과 */
  .result-section{display:none;}
  .result-section.show{display:block;}
  .result-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
  .result-item{display:flex;flex-direction:column;gap:5px;}
  .result-item.full{grid-column:1/-1;}
  .result-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;color:var(--text3);}
  .result-value{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius2);padding:10px 12px;font-size:13px;line-height:1.7;min-height:40px;}
  .result-value.editable{cursor:text;}
  .result-value.editable:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(67,97,238,0.1);}

  .chip{background:var(--accent-light);color:var(--accent);border-radius:20px;padding:3px 10px;font-size:12px;font-weight:500;display:inline-block;margin:2px;}
  .list-item{display:flex;gap:8px;font-size:13px;line-height:1.6;padding:3px 0;}
  .list-item.decision::before{content:'✓';color:var(--green);font-weight:700;flex-shrink:0;}
  .list-item.action::before{content:'→';color:var(--accent);font-weight:700;flex-shrink:0;}

  /* 저장 버튼 영역 */
  .save-area{display:flex;gap:10px;margin-top:16px;}

  /* 구분선 */
  .divider{height:1px;background:var(--border);margin:16px 0;}

  /* 힌트 */
  .hint{font-size:12px;color:var(--text3);line-height:1.6;padding:10px 14px;background:var(--surface2);border-radius:var(--radius2);border-left:3px solid var(--accent);}

  .toast-container{position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column;gap:8px;z-index:300;}
  .toast{background:var(--text);color:#fff;padding:11px 18px;border-radius:var(--radius2);font-size:13px;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,0.25);transform:translateX(100px);opacity:0;transition:all 0.25s;max-width:320px;}
  .toast.show{transform:translateX(0);opacity:1;}
  .toast.success{background:var(--green);}
  .toast.error{background:var(--red);}
  .toast.info{background:var(--accent);}

  ::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px;}

  @media(max-width:600px){
    .container{padding:16px;}
    .result-grid{grid-template-columns:1fr;}
    .result-item.full{grid-column:1;}
    .save-area{flex-direction:column;}
    .header{padding:0 16px;}
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">📋</div>
  <div class="header-title">회의록 관리</div>
  <div class="header-sub">Meeting Notes</div>
</div>

<div class="container">

  <!-- 입력 카드 -->
  <div class="card">
    <div class="card-header">
      <div class="card-icon blue">✏️</div>
      <div>
        <div class="card-title">회의 내용 입력</div>
        <div class="card-desc">회의 중 메모한 내용을 두서없이 입력하세요 → AI가 자동으로 정리합니다</div>
      </div>
    </div>
    <div class="card-body">

      <div class="hint" style="margin-bottom:16px;">
        💡 참석자, 논의 내용, 결정사항, 할 일 등을 자유롭게 입력하세요.<br>
        문장이 아니어도 괜찮습니다. 키워드나 메모 형태로 입력해도 AI가 정리합니다.
      </div>

      <div class="form-group">
        <label class="form-label">📝 회의 내용</label>
        <textarea class="form-input form-textarea" id="inputText" 
          placeholder="예시)&#10;참석: 김팀장, 이대리, 박주임&#10;날짜: 오늘&#10;&#10;- 6월 음반 발주량 검토&#10;- A타이틀 500장 추가 발주 결정&#10;- 과재고 품목 할인 프로모션 진행하기로&#10;- 이대리가 다음주까지 재고 분석 보고서 작성&#10;- 박주임 거래처 미팅 잡기"></textarea>
      </div>

      <div class="form-group">
        <label class="form-label">📅 회의 날짜</label>
        <input type="date" class="form-input" id="inputDate" style="max-width:200px;" />
      </div>

      <!-- AI 상태 -->
      <div class="status-box idle" id="statusBox">
        <span id="statusIcon">✦</span>
        <span id="statusText">AI 자동 정리 대기 중</span>
      </div>

      <button class="btn btn-primary btn-full" id="btnAnalyze" onclick="analyzeWithGemini()">
        ✦ AI로 회의록 자동 정리
      </button>
    </div>
  </div>

  <!-- 결과 카드 -->
  <div class="card result-section" id="resultSection">
    <div class="card-header">
      <div class="card-icon green">📄</div>
      <div>
        <div class="card-title">회의록 정리 결과</div>
        <div class="card-desc">내용을 직접 수정할 수 있습니다</div>
      </div>
    </div>
    <div class="card-body">

      <div class="result-grid">
        <div class="result-item full">
          <div class="result-label">📌 회의 제목</div>
          <div class="result-value editable" id="rTitle" contenteditable="true"></div>
        </div>
        <div class="result-item">
          <div class="result-label">📅 날짜</div>
          <div class="result-value" id="rDate"></div>
        </div>
        <div class="result-item">
          <div class="result-label">👥 참석자</div>
          <div class="result-value" id="rAttendees"></div>
        </div>
        <div class="result-item full">
          <div class="result-label">📝 회의 요약</div>
          <div class="result-value editable" id="rSummary" contenteditable="true"></div>
        </div>
        <div class="result-item full">
          <div class="result-label">✅ 결정사항</div>
          <div class="result-value" id="rDecisions"></div>
        </div>
        <div class="result-item full">
          <div class="result-label">⚡ Action Items</div>
          <div class="result-value" id="rActions"></div>
        </div>
      </div>

      <div class="divider"></div>

      <div class="save-area">
        <button class="btn btn-green" onclick="saveToSheets()" id="btnSheets" style="flex:1;">
          📊 구글 시트에 저장
        </button>
        <button class="btn btn-outline" onclick="copyResult()" style="flex:1;">
          📋 클립보드 복사
        </button>
        <button class="btn btn-outline" onclick="resetAll()" style="flex:1;">
          🔄 새 회의록
        </button>
      </div>

    </div>
  </div>

</div>

<div class="toast-container" id="toastContainer"></div>

<script>
// ===== CONFIG =====
// 아래 두 가지를 본인 값으로 교체하세요
const GEMINI_API_KEY = 'AQ.Ab8RN6LgW0hRREPZaTpy3Kij9axJ5CeU9TUf4YCdauFWT3Ce7Q';       // Gemini API 키
const APPS_SCRIPT_URL = 'YOUR_APPS_SCRIPT_URL';     // Google Apps Script 웹 앱 URL

// ===== 초기화 =====
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('inputDate').value = new Date().toISOString().split('T')[0];
});

// ===== AI 분석 =====
async function analyzeWithGemini() {
  const text = document.getElementById('inputText').value.trim();
  const date = document.getElementById('inputDate').value;

  if (!text) { showToast('회의 내용을 입력해 주세요', 'error'); return; }
  if (!GEMINI_API_KEY || GEMINI_API_KEY === 'AQ.Ab8RN6LgW0hRREPZaTpy3Kij9axJ5CeU9TUf4YCdauFWT3Ce7Q') {
    showToast('Gemini API 키를 설정해 주세요', 'error'); return;
  }

  setStatus('loading', '⟳', 'AI가 회의록을 정리 중입니다...');
  document.getElementById('btnAnalyze').disabled = true;

  const prompt = `아래는 회의 메모입니다. 다음 JSON 형식으로만 응답하세요. 다른 텍스트나 마크다운은 포함하지 마세요.

{
  "title": "회의 제목 (20자 이내, 핵심 주제 포함)",
  "attendees": ["참석자1", "참석자2"],
  "summary": "회의 핵심 내용 요약 (3-5문장, 구체적으로)",
  "decisions": ["결정사항1", "결정사항2"],
  "actions": ["담당자: 액션아이템 (기한 있으면 포함)", "담당자: 액션아이템"]
}

참석자, 결정사항, 액션아이템을 메모에서 최대한 추출해 주세요.
메모에 명확하지 않은 부분은 합리적으로 추론해 주세요.

회의 메모:
${text}`;

  try {
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
      }
    );
    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || 'API 오류');

    let raw = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    raw = raw.replace(/```json|```/g, '').trim();
    const p = JSON.parse(raw);

    // 결과 표시
    document.getElementById('rTitle').textContent = p.title || '';
    document.getElementById('rDate').textContent = date || new Date().toISOString().split('T')[0];

    const att = p.attendees || [];
    document.getElementById('rAttendees').innerHTML = att.length
      ? att.map(a => `<span class="chip">👤 ${esc(a)}</span>`).join('')
      : '<span style="color:var(--text3);">-</span>';

    document.getElementById('rSummary').textContent = p.summary || '';

    const dec = p.decisions || [];
    document.getElementById('rDecisions').innerHTML = dec.length
      ? dec.map(d => `<div class="list-item decision">${esc(d)}</div>`).join('')
      : '<span style="color:var(--text3);">-</span>';

    const act = p.actions || [];
    document.getElementById('rActions').innerHTML = act.length
      ? act.map(a => `<div class="list-item action">${esc(a)}</div>`).join('')
      : '<span style="color:var(--text3);">-</span>';

    document.getElementById('resultSection').classList.add('show');
    setStatus('done', '✅', '정리 완료! 내용을 확인하고 저장하세요');
    showToast('✅ AI 정리 완료!', 'success');

    // 결과 섹션으로 스크롤
    document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth' });

  } catch(e) {
    setStatus('error', '❌', '오류: ' + e.message);
    showToast('오류: ' + e.message, 'error');
  }

  document.getElementById('btnAnalyze').disabled = false;
}

// ===== 구글 시트에 저장 =====
async function saveToSheets() {
  if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL === 'YOUR_APPS_SCRIPT_URL') {
    showToast('Apps Script URL을 설정해 주세요', 'error'); return;
  }

  const payload = {
    date: document.getElementById('rDate').textContent,
    title: document.getElementById('rTitle').textContent,
    attendees: document.getElementById('rAttendees').innerText.replace(/👤\s*/g, '').trim(),
    summary: document.getElementById('rSummary').textContent,
    decisions: document.getElementById('rDecisions').innerText,
    actions: document.getElementById('rActions').innerText,
    rawText: document.getElementById('inputText').value
  };

  document.getElementById('btnSheets').disabled = true;
  document.getElementById('btnSheets').textContent = '저장 중...';

  try {
    const res = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(payload)
    });
    const result = await res.text();
    if (result.includes('success') || res.ok) {
      showToast('✅ 구글 시트에 저장되었습니다!', 'success');
    } else {
      throw new Error('저장 실패');
    }
  } catch(e) {
    showToast('저장 오류: ' + e.message, 'error');
  }

  document.getElementById('btnSheets').disabled = false;
  document.getElementById('btnSheets').innerHTML = '📊 구글 시트에 저장';
}

// ===== 클립보드 복사 =====
function copyResult() {
  const title = document.getElementById('rTitle').textContent;
  const date = document.getElementById('rDate').textContent;
  const attendees = document.getElementById('rAttendees').innerText.replace(/👤\s*/g, '');
  const summary = document.getElementById('rSummary').textContent;
  const decisions = document.getElementById('rDecisions').innerText;
  const actions = document.getElementById('rActions').innerText;

  const text = `📋 ${title}
📅 날짜: ${date}
👥 참석자: ${attendees}

📝 회의 요약
${summary}

✅ 결정사항
${decisions}

⚡ Action Items
${actions}`;

  navigator.clipboard.writeText(text).then(() => {
    showToast('📋 클립보드에 복사되었습니다!', 'success');
  }).catch(() => {
    showToast('복사 실패. 직접 선택해서 복사해 주세요.', 'error');
  });
}

// ===== 초기화 =====
function resetAll() {
  document.getElementById('inputText').value = '';
  document.getElementById('inputDate').value = new Date().toISOString().split('T')[0];
  document.getElementById('resultSection').classList.remove('show');
  setStatus('idle', '✦', 'AI 자동 정리 대기 중');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ===== 유틸 =====
function setStatus(type, icon, text) {
  const box = document.getElementById('statusBox');
  box.className = 'status-box ' + type;
  document.getElementById('statusIcon').textContent = icon;
  if (type === 'loading') document.getElementById('statusIcon').className = 'spin';
  else document.getElementById('statusIcon').className = '';
  document.getElementById('statusText').textContent = text;
}

function showToast(msg, type='info', dur=2800) {
  const c=document.getElementById('toastContainer'),t=document.createElement('div');
  t.className='toast '+type;t.textContent=msg;c.appendChild(t);
  requestAnimationFrame(()=>requestAnimationFrame(()=>t.classList.add('show')));
  setTimeout(()=>{t.classList.remove('show');setTimeout(()=>t.remove(),300);},dur);
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
