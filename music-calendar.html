<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>음반 출시 달력</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f0f2f5;padding:20px}
.container{max-width:1500px;margin:0 auto}
.header{margin-bottom:14px}
h1{font-size:21px;font-weight:700;color:#1a1a2e}
.stats{color:#888;font-size:11px;margin-top:3px}
.layout{display:flex;gap:20px;align-items:flex-start}
.cal-wrap{flex:0 0 320px}
.cal{background:white;border-radius:12px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.cal-nav h2{font-size:13px;font-weight:700;color:#222}
.nav-btn{background:none;border:1px solid #ddd;border-radius:6px;padding:3px 9px;cursor:pointer;font-size:12px;color:#555}
.nav-btn:hover{background:#f5f5f5}
.day-labels{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:2px}
.day-label{text-align:center;font-size:9px;font-weight:700;padding:3px 0;color:#aaa}
.day-label.sun{color:#e53935}.day-label.sat{color:#1e88e5}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-cell{display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
  padding:2px 1px;border:1px solid #eee;border-radius:4px;cursor:pointer;min-height:38px;transition:all 0.12s}
.cal-cell:hover{background:#f0f7ff}
.cal-cell.empty{border-color:transparent;cursor:default}.cal-cell.empty:hover{background:transparent}
.cal-cell.sun .day-num{color:#e53935}.cal-cell.sat .day-num{color:#1e88e5}
.cal-cell.holiday{background:#fff3f3}.cal-cell.holiday .day-num{color:#e53935}
.cal-cell.has-future{background:#1565c0;border-color:#1565c0}
.cal-cell.has-future .day-num{color:white;font-weight:700}
.cal-cell.has-future .cnt{color:rgba(255,255,255,0.85)}
.cal-cell.has-past{background:#dce4f0;border-color:#b8c8e0}
.cal-cell.has-past .day-num{color:#4a6490}
.cal-cell.has-past .cnt{color:#6a84b0}
.cal-cell.today-cell{outline:2px solid #ff6f00;outline-offset:-2px}
.cal-cell.selected{box-shadow:0 0 0 2px #ff6f00}
.day-num{font-size:11px;font-weight:600;color:#333;margin-top:1px}
.cnt{font-size:9px;color:#777;font-weight:600}
.right{flex:1;min-width:0}
.search-bar{background:white;border-radius:10px;padding:9px 13px;margin-bottom:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.06);display:flex;gap:8px;align-items:center}
.search-bar label{font-size:11px;color:#999;font-weight:600;white-space:nowrap}
.search-input{flex:1;border:1px solid #e0e0e0;border-radius:6px;padding:5px 10px;font-size:12px;outline:none}
.search-input:focus{border-color:#1565c0}
.search-select{border:1px solid #e0e0e0;border-radius:6px;padding:5px 8px;font-size:12px;
  outline:none;background:white;color:#333;cursor:pointer}
.reset-btn{background:#f5f5f5;border:1px solid #ddd;border-radius:6px;padding:5px 10px;
  cursor:pointer;font-size:11px;color:#666;white-space:nowrap}
.reset-btn:hover{background:#e8e8e8}
.panel-head{background:white;border-radius:10px;padding:0;margin-bottom:12px;
  box-shadow:0 2px 6px rgba(0,0,0,0.06);overflow:hidden}
.panel-info{padding:10px 14px 0;display:flex;align-items:center;justify-content:space-between}
.panel-title{font-size:13px;font-weight:700;color:#222}
.panel-cnt{font-size:11px;color:#999}
.tab-bar{display:flex;border-top:1px solid #f0f0f0;margin-top:8px}
.tab-btn{flex:1;padding:9px 4px;border:none;background:none;cursor:pointer;font-size:12px;
  font-weight:600;color:#aaa;border-bottom:2px solid transparent;transition:all 0.15s;
  display:flex;align-items:center;justify-content:center;gap:4px}
.tab-btn:hover{color:#555;background:#fafafa}
.tab-btn.active{color:#1565c0;border-bottom-color:#1565c0}
.tab-cnt{font-size:10px;background:#eee;padding:1px 5px;border-radius:8px;color:#888}
.tab-btn.active .tab-cnt{background:#e3f2fd;color:#1565c0}
.card-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.card{background:white;border-radius:8px;overflow:hidden;
  box-shadow:0 1px 4px rgba(0,0,0,0.08);cursor:pointer;transition:all 0.15s;display:flex;flex-direction:column}
.card:hover{box-shadow:0 4px 14px rgba(0,0,0,0.13);transform:translateY(-2px)}
.card-head{color:white;padding:10px 12px}
.head-row1{display:flex;align-items:center;gap:5px;margin-bottom:5px;flex-wrap:wrap}
.head-date{font-size:10px;opacity:0.8}
.media-badge{font-size:10px;font-weight:700;background:rgba(255,255,255,0.28);padding:1px 6px;border-radius:3px}
.buyer-badge{font-size:10px;background:rgba(0,0,0,0.18);padding:1px 6px;border-radius:3px;color:rgba(255,255,255,0.9)}
.head-row2{font-size:13px;font-weight:700;line-height:1.35}
.head-sub{font-size:11px;opacity:0.8;margin-top:3px}
.n-count{display:inline-block;background:rgba(255,255,255,0.3);font-size:10px;padding:1px 5px;border-radius:3px;margin-left:5px;font-weight:700}
.card-items{flex:1;background:white}
.item-row{display:flex;justify-content:space-between;align-items:center;
  padding:5px 12px;border-bottom:1px solid #f5f5f5;gap:8px;cursor:pointer}
.item-row:hover{background:#fafafa}
.item-row:last-child{border-bottom:none}
.item-left{font-size:11px;color:#444;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.item-right{font-size:11px;color:#1565c0;font-weight:600;white-space:nowrap}
.item-artist{font-size:10px;color:#aaa;margin-right:3px}
.item-code{font-size:10px;color:#bbb;margin-left:4px}
.item-media-tag{font-size:9px;font-weight:700;background:#eee;color:#888;padding:1px 4px;border-radius:3px;margin-left:4px}
.more-row{text-align:center;padding:5px;font-size:11px;color:#aaa;cursor:pointer;background:#fafafa}
.more-row:hover{background:#f0f0f0;color:#555}
.no-result{text-align:center;padding:50px;color:#ccc;font-size:14px;grid-column:1/-1}
.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.45);z-index:1000;overflow-y:auto}
.modal.show{display:flex;align-items:flex-start;justify-content:center;padding:40px 20px}
.modal-box{background:white;border-radius:12px;width:100%;max-width:520px;box-shadow:0 8px 30px rgba(0,0,0,0.2)}
.modal-head{color:white;padding:13px 16px;border-radius:12px 12px 0 0;display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:13px;font-weight:700;flex:1}
.close-btn{background:none;border:none;color:white;font-size:20px;cursor:pointer;line-height:1}
.modal-body{padding:16px}
.info-row{display:flex;gap:8px;margin-bottom:7px;align-items:baseline}
.info-lbl{font-size:11px;color:#aaa;width:65px;flex-shrink:0}
.info-val{font-size:12px;color:#333;word-break:break-all}
.modal-item{padding:8px 0;border-bottom:1px solid #f0f0f0;cursor:pointer}
.modal-item:hover{background:#fafafa;margin:0 -16px;padding:8px 16px}
.modal-item:last-child{border-bottom:none}
.modal-item-name{font-size:12px;font-weight:600;color:#333}
.modal-item-sub{font-size:11px;color:#888;margin-top:2px}
.modal-btn-wrap{padding:12px 16px;background:#f8f8f8;border-bottom:1px solid #eee;text-align:center}
.ht-btn{display:inline-block;background:#1565c0;color:white;text-decoration:none;
  padding:8px 20px;border-radius:6px;font-size:13px;font-weight:600}
.ht-btn:hover{background:#0d47a1}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🎵 음반 출시 달력</h1>
    <div class="stats" id="statsBar"></div>
  </div>
  <div class="layout">
    <div class="cal-wrap">
      <div class="cal">
        <div class="cal-nav">
          <button class="nav-btn" id="prevM">◀</button>
          <h2 id="calTitle"></h2>
          <button class="nav-btn" id="nextM">▶</button>
        </div>
        <div class="day-labels">
          <div class="day-label sun">일</div><div class="day-label">월</div>
          <div class="day-label">화</div><div class="day-label">수</div>
          <div class="day-label">목</div><div class="day-label">금</div>
          <div class="day-label sat">토</div>
        </div>
        <div class="cal-grid" id="calGrid"></div>
      </div>
    </div>
    <div class="right">
      <div class="search-bar">
        <label>검색</label>
        <select class="search-select" id="dateFilter" onchange="applyFilter()"><option value="">출시일자 전체</option></select>
        <input class="search-input" id="artistSearch" placeholder="가수명..." oninput="applyFilter()">
        <input class="search-input" id="productSearch" placeholder="상품명..." oninput="applyFilter()">
        <input class="search-input" id="buyerSearch" placeholder="매입처명..." oninput="applyFilter()">
        <button class="reset-btn" onclick="resetAll()">초기화</button>
      </div>
      <div class="panel-head">
        <div class="panel-info">
          <span class="panel-title" id="panelTitle">전체 목록</span>
          <span class="panel-cnt" id="panelCnt"></span>
        </div>
        <div class="tab-bar" id="tabBar"></div>
      </div>
      <div class="card-grid" id="cardGrid"></div>
    </div>
  </div>
</div>
<div class="modal" id="modal">
  <div class="modal-box">
    <div class="modal-head" id="modalHead">
      <div class="modal-title" id="modalTitle"></div>
      <button class="close-btn" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

function init(){
  const dates=albums.map(a=>a.출시일자).sort();
  document.getElementById('statsBar').textContent='총 '+albums.length.toLocaleString()+'개 | '+dates[0]+' ~ '+dates[dates.length-1]+' | 생성: '+TODAY;
  // 날짜 필터 옵션 구성
  const uniqueDates=[...new Set(dates)];
  const sel=document.getElementById('dateFilter');
  uniqueDates.forEach(d=>{const opt=document.createElement('option');opt.value=d;opt.textContent=d;sel.appendChild(opt);});
  // 오늘 날짜에 데이터가 있으면 자동 선택
  const hasToday=albums.some(a=>a.출시일자===TODAY);
  if(hasToday){selectedDate=TODAY;sel.value=TODAY;}
  renderCal(); applyFilter();
}

function renderCal(){
  const MN=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('calTitle').textContent=curYear+'년 '+MN[curMonth];
  const grid=document.getElementById('calGrid'); grid.innerHTML='';
  const frag=document.createDocumentFragment();
  const fd=new Date(curYear,curMonth,1).getDay();
  const dim=new Date(curYear,curMonth+1,0).getDate();
  const pfx=curYear+'-'+String(curMonth+1).padStart(2,'0');
  const dc={};
  albums.forEach(a=>{if(a.출시일자.startsWith(pfx)) dc[a.출시일자]=(dc[a.출시일자]||0)+1;});
  for(let i=0;i<fd;i++){const d=document.createElement('div');d.className='cal-cell empty';frag.appendChild(d);}
  for(let day=1;day<=dim;day++){
    const ds=pfx+'-'+String(day).padStart(2,'0');
    const dow=new Date(curYear,curMonth,day).getDay();
    const cnt=dc[ds]||0,isPast=ds<TODAY,isToday=ds===TODAY;
    const d=document.createElement('div');
    let cls='cal-cell';
    if(dow===0) cls+=' sun'; if(dow===6) cls+=' sat';
    if(holidays[ds]) cls+=' holiday';
    if(cnt>0) cls+=(isPast?' has-past':' has-future');
    if(isToday) cls+=' today-cell';
    if(selectedDate===ds) cls+=' selected';
    d.className=cls; d.onclick=()=>onDateClick(ds);
    const num=document.createElement('div');num.className='day-num';num.textContent=day;d.appendChild(num);
    if(cnt>0){const c=document.createElement('div');c.className='cnt';c.textContent=cnt+'건';d.appendChild(c);}
    frag.appendChild(d);
  }
  const rem=(fd+dim)%7;
  if(rem>0) for(let i=0;i<7-rem;i++){const d=document.createElement('div');d.className='cal-cell empty';frag.appendChild(d);}
  grid.appendChild(frag);
}

function onDateClick(ds){
  selectedDate=(selectedDate===ds)?null:ds;
  document.getElementById('dateFilter').value=selectedDate||'';
  renderCal();applyFilter();
}

function applyFilter(){
  const art=document.getElementById('artistSearch').value.trim().toLowerCase();
  const prd=document.getElementById('productSearch').value.trim().toLowerCase();
  const buyer=document.getElementById('buyerSearch').value.trim().toLowerCase();
  const dateVal=document.getElementById('dateFilter').value;
  // 날짜 드롭다운 선택 시 selectedDate도 동기화
  if(dateVal) selectedDate=dateVal;
  filtered=albums.filter(a=>{
    if(selectedDate&&a.출시일자!==selectedDate) return false;
    if(art&&!a.가수명.toLowerCase().includes(art)) return false;
    if(prd&&!a.상품명.toLowerCase().includes(prd)) return false;
    if(buyer&&!(a.매입처명||'').toLowerCase().includes(buyer)) return false;
    return true;
  });
  let title='전체 목록';
  if(selectedDate) title=selectedDate+' 출시';
  document.getElementById('panelTitle').textContent=title;
  document.getElementById('panelCnt').textContent=filtered.length.toLocaleString()+'개';
  buildTabs();
}

function resetAll(){
  selectedDate=null;activeTab=null;
  document.getElementById('artistSearch').value='';
  document.getElementById('productSearch').value='';
  document.getElementById('buyerSearch').value='';
  document.getElementById('dateFilter').value='';
  renderCal();applyFilter();
}

function buildTabs(){
  const bySec={};
  filtered.forEach(a=>{const s=a.대분류||'기타';(bySec[s]=bySec[s]||[]).push(a);});
  const avail=SEC_ORDER.filter(s=>bySec[s]);
  if(!activeTab||!bySec[activeTab]) activeTab=avail[0]||null;
  const bar=document.getElementById('tabBar');bar.innerHTML='';
  avail.forEach(sec=>{
    const btn=document.createElement('button');
    btn.className='tab-btn'+(sec===activeTab?' active':'');
    btn.innerHTML=SEC_ICON[sec]+' '+sec+'<span class="tab-cnt">'+bySec[sec].length+'</span>';
    btn.onclick=()=>{activeTab=sec;buildTabs();};
    bar.appendChild(btn);
  });
  renderCards(bySec[activeTab]||[],activeTab);
}

function albumBase(name){
  const r=name.replace(/\s*\[[^\[\]]*(?:VER|VER\.|버전|TYPE|에디션|EDITION|한정|초회)[^\[\]]*\]\s*$/i,'').trim();
  return r||name;
}

function videoGroupKey(name){
  // 마지막 [영문제목] 내용을 그룹 키로 사용
  const matches=[...name.matchAll(/\[([^\[\]]+)\]/g)];
  if(matches.length>0) return matches[matches.length-1][1].trim();
  return name;
}

function videoDisplayBase(name){
  // 한국어 앞부분 + 마지막 [영문] 괄호로 표시명 구성
  const matches=[...name.matchAll(/\[([^\[\]]+)\]/g)];
  if(!matches.length) return name;
  const lastBracket='['+matches[matches.length-1][1]+']';
  const prefix=name.split('[')[0].trim();
  return prefix?prefix+' '+lastBracket:name;
}

function renderCards(items,sec){
  const grid=document.getElementById('cardGrid');grid.innerHTML='';
  if(!items||items.length===0){
    const msg=selectedDate?'📭 '+selectedDate+' 출시예정 상품이 없습니다':'표시할 항목이 없습니다';
    grid.innerHTML='<div class="no-result">'+msg+'</div>';return;
  }
  const frag=document.createDocumentFragment();
  const color=SEC_COLOR[sec]||'#546e7a';
  if(sec==='가요'){
    const grp={};
    items.forEach(a=>{
      const base=albumBase(a.상품명);
      const key=a.가수명+'§'+base;
      if(!grp[key]) grp[key]={가수명:a.가수명,앨범명:base,items:[]};
      grp[key].items.push(a);
    });
    Object.values(grp).forEach(g=>frag.appendChild(makeKayoCard(g,color)));
  } else if(sec==='POP'||sec==='CLASSIC'){
    const grp={};
    items.forEach(a=>{
      const key=(a.레이블명||'-')+'§'+(a.매입처명||'-');
      if(!grp[key]) grp[key]={레이블명:a.레이블명||'-',매입처명:a.매입처명||'-',items:[]};
      grp[key].items.push(a);
    });
    Object.values(grp).forEach(g=>frag.appendChild(makePopCard(g,color)));
  } else {
    // 영상: 마지막 [영문제목] 괄호를 그룹 키로 사용
    const grp={};
    items.forEach(a=>{
      const key=videoGroupKey(a.상품명);
      if(!grp[key]) grp[key]={기본명:videoDisplayBase(a.상품명),items:[]};
      grp[key].items.push(a);
    });
    Object.values(grp).forEach(g=>frag.appendChild(makeVideoCard(g,color)));
  }
  grid.appendChild(frag);
}

function makeHead(color,dates,medias,mainText,subText,cnt,buyerText){
  const head=document.createElement('div');head.className='card-head';head.style.background=color;
  const r1=document.createElement('div');r1.className='head-row1';
  r1.innerHTML='<span class="head-date">'+dates.slice(0,2).join(', ')+(dates.length>2?' 외':'')+'</span>'+
    medias.map(m=>'<span class="media-badge">'+m+'</span>').join('')+
    (buyerText?'<span class="buyer-badge">'+buyerText+'</span>':'');
  const r2=document.createElement('div');r2.className='head-row2';
  r2.textContent=mainText;
  if(cnt>1) r2.innerHTML+=`<span class="n-count">${cnt}종</span>`;
  head.appendChild(r1);head.appendChild(r2);
  if(subText){const s=document.createElement('div');s.className='head-sub';s.textContent=subText;head.appendChild(s);}
  return head;
}

function makeItemsDiv(rows, moreCount, onMore){
  const div=document.createElement('div');div.className='card-items';
  rows.forEach(([left,right,onclick])=>{
    const row=document.createElement('div');row.className='item-row';
    row.innerHTML='<span class="item-left">'+left+'</span><span class="item-right">'+right+'</span>';
    if(onclick) row.onclick=e=>{e.stopPropagation();onclick();};
    div.appendChild(row);
  });
  if(moreCount>0){
    const m=document.createElement('div');m.className='more-row';
    m.textContent='+ '+moreCount+'개 더 보기';
    m.onclick=e=>{e.stopPropagation();onMore();};
    div.appendChild(m);
  }
  return div;
}

function makeKayoCard(g,color){
  const card=document.createElement('div');card.className='card';
  const dates=[...new Set(g.items.map(v=>v.출시일자))].sort();
  const medias=[...new Set(g.items.map(v=>v.미디어))];
  const buyers=[...new Set(g.items.map(v=>v.매입처명||''))].filter(Boolean).join(', ');
  card.appendChild(makeHead(color,dates,medias,g.가수명+' — '+g.앨범명,'',g.items.length,buyers));
  const show=g.items.slice(0,4);
  const rows=show.map(v=>{
    const vname=v.상품명.replace(g.앨범명,'').trim().replace(/^[\[\-\s]+|[\]\s]+$/g,'');
    const label=(vname||v.상품명)+'<span class="item-code"> '+v.상품코드+'</span><span class="item-media-tag">'+v.미디어+'</span>';
    return [label, '판매가 '+Number(v.판매가).toLocaleString()+'원', ()=>showDetail(v)];
  });
  card.appendChild(makeItemsDiv(rows, g.items.length-4>0?g.items.length-4:0, ()=>showGroupModal(g,'가요',color)));
  return card;
}

function makePopCard(g,color){
  const card=document.createElement('div');card.className='card';
  const dates=[...new Set(g.items.map(v=>v.출시일자))].sort();
  const medias=[...new Set(g.items.map(v=>v.미디어))];
  card.appendChild(makeHead(color,dates,medias,g.레이블명,'',g.items.length,g.매입처명));
  const show=g.items.slice(0,4);
  const rows=show.map(v=>{
    const short=v.상품명.length>28?v.상품명.substring(0,28)+'…':v.상품명;
    const label='<span class="item-artist">'+v.가수명+'</span>'+short+'<span class="item-code"> '+v.상품코드+'</span><span class="item-media-tag">'+v.미디어+'</span>';
    return [label, '판매가 '+Number(v.판매가).toLocaleString()+'원', ()=>showDetail(v)];
  });
  card.appendChild(makeItemsDiv(rows, g.items.length-4>0?g.items.length-4:0, ()=>showGroupModal(g,'pop',color)));
  return card;
}

function makeVideoCard(g,color){
  const card=document.createElement('div');card.className='card';
  const dates=[...new Set(g.items.map(v=>v.출시일자))].sort();
  const medias=[...new Set(g.items.map(v=>v.미디어))];
  const buyers=[...new Set(g.items.map(v=>v.매입처명||''))].filter(Boolean).join(', ');
  const short=g.기본명.length>38?g.기본명.substring(0,38)+'…':g.기본명;
  card.appendChild(makeHead(color,dates,medias,short,'',g.items.length,buyers));
  const show=g.items.slice(0,4);
  const rows=show.map(v=>{
    const vname=v.상품명.replace(g.기본명,'').trim().replace(/^[\[\-\s]+|[\]\s]+$/g,'');
    const label=(vname||v.상품명)+'<span class="item-code"> '+v.상품코드+'</span><span class="item-media-tag">'+v.미디어+'</span>';
    return [label, '판매가 '+Number(v.판매가).toLocaleString()+'원', ()=>showDetail(v)];
  });
  card.appendChild(makeItemsDiv(rows, g.items.length-4>0?g.items.length-4:0, ()=>showGroupModal(g,'영상',color)));
  return card;
}

function showDetail(a){
  const color=SEC_COLOR[a.대분류]||'#546e7a';
  document.getElementById('modalHead').style.background=color;
  document.getElementById('modalTitle').textContent=a.가수명+' — '+a.상품명;
  const body=document.getElementById('modalBody');body.innerHTML='';
  const f=document.createDocumentFragment();
  // 핫트랙스 링크 버튼
  const btnWrap=document.createElement('div');btnWrap.className='modal-btn-wrap';
  const htUrl='https://hottracks.kyobobook.co.kr/p/'+a.상품코드.trim();
  btnWrap.innerHTML='<a class="ht-btn" href="'+htUrl+'" target="_blank">🖼️ 앨범 이미지 보기</a>';
  f.appendChild(btnWrap);
  // 상품 정보
  const rows=[['상품명',a.상품명],['가수명',a.가수명],['출시일자',a.출시일자],['미디어',a.미디어],
    ['판매가','판매가 '+Number(a.판매가).toLocaleString()+'원'],['레이블',a.레이블명],['매입처',a.매입처명],
    ['분류',(a.대분류||'')+' > '+(a.상품분류||'')],['상품코드',a.상품코드],['음반코드',a.음반코드]];
  rows.forEach(([l,v])=>{const r=document.createElement('div');r.className='info-row';
    r.innerHTML='<div class="info-lbl">'+l+'</div><div class="info-val">'+v+'</div>';f.appendChild(r);});
  body.appendChild(f);
  document.getElementById('modal').classList.add('show');
}

function showGroupModal(g,type,color){
  document.getElementById('modalHead').style.background=color;
  const body=document.getElementById('modalBody');body.innerHTML='';
  const f=document.createDocumentFragment();
  if(type==='영상'){
    document.getElementById('modalTitle').textContent=g.기본명;
    const body=document.getElementById('modalBody');body.innerHTML='';
    const f=document.createDocumentFragment();
    g.items.forEach(v=>{
      const vname=v.상품명.replace(g.기본명,'').trim().replace(/^[\[\-\s]+|[\]\s]+$/g,'');
      const row=document.createElement('div');row.className='modal-item';
      row.innerHTML='<div class="modal-item-name">'+(vname||v.상품명)+'</div>'+
        '<div class="modal-item-sub">'+v.미디어+' · '+v.상품코드+' · 판매가 '+Number(v.판매가).toLocaleString()+'원</div>';
      row.onclick=()=>{closeModal();setTimeout(()=>showDetail(v),80);};
      f.appendChild(row);
    });
    body.appendChild(f);
  } else if(type==='가요'){
    document.getElementById('modalTitle').textContent=g.가수명+' — '+g.앨범명;
    g.items.forEach(v=>{
      const vname=v.상품명.replace(g.앨범명,'').trim().replace(/^[\[\-\s]+|[\]\s]+$/g,'');
      const row=document.createElement('div');row.className='modal-item';
      row.innerHTML='<div class="modal-item-name">'+(vname||v.상품명)+'</div>'+
        '<div class="modal-item-sub">'+v.출시일자+' · '+Number(v.판매가).toLocaleString()+'원</div>';
      row.onclick=()=>{closeModal();setTimeout(()=>showDetail(v),80);};
      f.appendChild(row);
    });
  } else {
    document.getElementById('modalTitle').textContent=g.레이블명+' / '+g.매입처명;
    g.items.forEach(v=>{
      const row=document.createElement('div');row.className='modal-item';
      const short=v.상품명.length>48?v.상품명.substring(0,48)+'…':v.상품명;
      row.innerHTML='<div class="modal-item-name">'+short+'</div>'+
        '<div class="modal-item-sub">'+v.가수명+' · '+v.출시일자+' · '+Number(v.판매가).toLocaleString()+'원</div>';
      row.onclick=()=>{closeModal();setTimeout(()=>showDetail(v),80);};
      f.appendChild(row);
    });
  }
  body.appendChild(f);
  document.getElementById('modal').classList.add('show');
}

function closeModal(){document.getElementById('modal').classList.remove('show');}
document.getElementById('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeModal();});
document.getElementById('prevM').onclick=()=>{if(--curMonth<0){curMonth=11;curYear--;}renderCal();};
document.getElementById('nextM').onclick=()=>{if(++curMonth>11){curMonth=0;curYear++;}renderCal();};
init();
</script>
