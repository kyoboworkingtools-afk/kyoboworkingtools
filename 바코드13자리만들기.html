<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>바코드 13자리 만들기</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; color: #1a1a18; min-height: 100vh; padding: 2rem 1rem; }
  .container { max-width: 820px; margin: 0 auto; }
  h1 { font-size: 20px; font-weight: 500; margin-bottom: 1.5rem; color: #1a1a18; }
  .card { background: #fff; border: 0.5px solid rgba(0,0,0,0.12); border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
  .label { font-size: 13px; color: #666; margin-bottom: 6px; }
  textarea { width: 100%; height: 140px; font-family: 'Courier New', monospace; font-size: 13px; resize: vertical; border: 0.5px solid rgba(0,0,0,0.2); border-radius: 8px; padding: 10px; background: #f9f9f7; color: #1a1a18; line-height: 1.6; outline: none; }
  textarea:focus { border-color: rgba(0,0,0,0.35); }
  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
  button { cursor: pointer; font-size: 13px; padding: 7px 16px; border-radius: 8px; border: 0.5px solid rgba(0,0,0,0.2); background: transparent; color: #1a1a18; font-family: inherit; }
  button:hover { background: #f5f5f3; }
  button.primary { background: #185FA5; color: #E6F1FB; border-color: #185FA5; }
  button.primary:hover { background: #0C447C; }
  button.success { background: #3B6D11; color: #EAF3DE; border-color: #3B6D11; }
  button.success:hover { background: #27500A; }
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 1rem; }
  .stat { background: #f5f5f3; border-radius: 8px; padding: 10px 12px; }
  .stat-label { font-size: 12px; color: #666; margin-bottom: 4px; }
  .stat-val { font-size: 20px; font-weight: 500; }
  .result-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .result-table th { text-align: left; padding: 7px 10px; font-weight: 500; font-size: 12px; color: #666; border-bottom: 0.5px solid rgba(0,0,0,0.1); }
  .result-table td { padding: 6px 10px; border-bottom: 0.5px solid rgba(0,0,0,0.07); font-family: 'Courier New', monospace; font-size: 12px; }
  .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 999px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  .badge-ok { background: #EAF3DE; color: #3B6D11; }
  .badge-padded { background: #E6F1FB; color: #185FA5; }
  .badge-over { background: #FCEBEB; color: #A32D2D; }
  .table-wrap { max-height: 360px; overflow-y: auto; border-radius: 8px; border: 0.5px solid rgba(0,0,0,0.1); }
  .filter-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; align-items: center; }
  .filter-row span { font-size: 12px; color: #666; }
  button.filter { font-size: 12px; padding: 4px 12px; }
  button.filter.active { background: #f0f0ee; border-color: rgba(0,0,0,0.3); }
  .row-orig { color: #888; }
  #result-section { display: none; }
</style>
</head>
<body>
<div class="container">
  <h1>바코드 13자리 만들기</h1>

  <div class="card">
    <div class="label">바코드 붙여넣기 (엑셀에서 복사 후 붙여넣기, 줄바꿈 구분)</div>
    <textarea id="input" placeholder="예시&#10;123456789012&#10;9780306406157&#10;9780306406157890&#10;4711&#10;0123456789012"></textarea>
    <div class="btn-row">
      <button class="primary" onclick="process()">▶ 변환하기</button>
      <button onclick="clearAll()">✕ 초기화</button>
    </div>
  </div>

  <div id="result-section">
    <div class="stats" id="stats"></div>

    <div class="card" style="padding-bottom: 0.75rem;">
      <div class="filter-row">
        <span>필터:</span>
        <button class="filter active" id="f-all" onclick="setFilter('all')">전체</button>
        <button class="filter" id="f-ok" onclick="setFilter('ok')">정상 (13자리)</button>
        <button class="filter" id="f-padded" onclick="setFilter('padded')">0 보정</button>
        <button class="filter" id="f-over" onclick="setFilter('over')">14자리 이상 ⚠</button>
      </div>
      <div class="table-wrap">
        <table class="result-table">
          <thead><tr>
            <th>#</th>
            <th>원본</th>
            <th>변환 결과</th>
            <th>상태</th>
          </tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
      <div class="btn-row" style="margin-top: 12px;">
        <button class="success" onclick="downloadExcel()">↓ 엑셀 다운로드 (.xlsx)</button>
        <button id="copy-btn" onclick="copyBarcodes()">⎘ 변환결과 복사</button>
      </div>
    </div>
  </div>
</div>

<script>
let rows = [];
let currentFilter = 'all';

function process() {
  const raw = document.getElementById('input').value.trim();
  if (!raw) return;
  const lines = raw.split(/\r?\n/).map(l => l.trim()).filter(l => l.length > 0);
  rows = lines.map((orig, i) => {
    const digits = orig.replace(/\D/g, '');
    let converted, status;
    if (digits.length === 13) {
      converted = digits; status = 'ok';
    } else if (digits.length < 13) {
      converted = digits.padStart(13, '0'); status = 'padded';
    } else {
      converted = digits; status = 'over';
    }
    return { idx: i + 1, orig, digits, converted, status };
  });
  currentFilter = 'all';
  ['all','ok','padded','over'].forEach(k => {
    document.getElementById('f-' + k).classList.toggle('active', k === 'all');
  });
  render();
  document.getElementById('result-section').style.display = 'block';
}

function render() {
  const filtered = rows.filter(r => currentFilter === 'all' || r.status === currentFilter);
  const ok = rows.filter(r => r.status === 'ok').length;
  const padded = rows.filter(r => r.status === 'padded').length;
  const over = rows.filter(r => r.status === 'over').length;

  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-label">전체</div><div class="stat-val">${rows.length}</div></div>
    <div class="stat"><div class="stat-label">정상 (13자리)</div><div class="stat-val" style="color:#3B6D11">${ok}</div></div>
    <div class="stat"><div class="stat-label">0 보정</div><div class="stat-val" style="color:#185FA5">${padded}</div></div>
    <div class="stat"><div class="stat-label">14자리 이상 ⚠</div><div class="stat-val" style="color:#A32D2D">${over}</div></div>
  `;

  const tbody = document.getElementById('tbody');
  if (filtered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;padding:2rem;color:#aaa;font-family:sans-serif">해당 항목 없음</td></tr>';
    return;
  }
  tbody.innerHTML = filtered.map(r => {
    const badge = r.status === 'ok'
      ? '<span class="badge badge-ok">정상</span>'
      : r.status === 'padded'
      ? '<span class="badge badge-padded">0 보정</span>'
      : '<span class="badge badge-over">⚠ 14자리 이상</span>';
    const convertedCell = r.status === 'over'
      ? `<span style="color:#A32D2D">${r.converted}</span>`
      : r.status === 'padded'
      ? `<span style="color:#185FA5">${r.converted}</span>`
      : r.converted;
    return `<tr>
      <td style="color:#bbb">${r.idx}</td>
      <td class="row-orig">${r.orig}</td>
      <td>${convertedCell}</td>
      <td>${badge}</td>
    </tr>`;
  }).join('');
}

function setFilter(f) {
  currentFilter = f;
  ['all','ok','padded','over'].forEach(k => {
    document.getElementById('f-' + k).classList.toggle('active', k === f);
  });
  render();
}

function clearAll() {
  document.getElementById('input').value = '';
  rows = [];
  currentFilter = 'all';
  document.getElementById('result-section').style.display = 'none';
}

function copyBarcodes() {
  if (!rows.length) return;
  const filtered = rows.filter(r => currentFilter === 'all' || r.status === currentFilter);
  const text = filtered.map(r => r.status === 'over' ? r.orig : r.converted).join('\n');
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copy-btn');
    const orig = btn.textContent;
    btn.textContent = '✓ 복사됨!';
    btn.style.background = '#3B6D11';
    btn.style.color = '#EAF3DE';
    btn.style.borderColor = '#3B6D11';
    setTimeout(() => {
      btn.textContent = orig;
      btn.style.background = '';
      btn.style.color = '';
      btn.style.borderColor = '';
    }, 1800);
  });
}

function downloadExcel() {
  if (!rows.length) return;
  const data = [['번호', '원본 바코드', '변환 바코드 (13자리)', '상태', '비고']];
  rows.forEach(r => {
    const statusLabel = r.status === 'ok' ? '정상' : r.status === 'padded' ? '0 보정' : '14자리 이상';
    const note = r.status === 'over' ? '수동 확인 필요' : '';
    const converted = r.status === 'over' ? r.orig : r.converted;
    data.push([r.idx, r.orig, converted, statusLabel, note]);
  });
  const ws = XLSX.utils.aoa_to_sheet(data);
  ws['!cols'] = [{ wch: 6 }, { wch: 20 }, { wch: 20 }, { wch: 12 }, { wch: 16 }];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '바코드 변환');
  const today = new Date();
  const dateStr = `${today.getFullYear()}${String(today.getMonth()+1).padStart(2,'0')}${String(today.getDate()).padStart(2,'0')}`;
  XLSX.writeFile(wb, `barcode_${dateStr}.xlsx`);
}
</script>
</body>
</html>
