      <button class="tasks-chip" onclick="setTaskFilter('status','진행중',this)">진행중</button>
      <button class="tasks-chip" onclick="setTaskFilter('status','완료',this)">완료</button>
      <button class="tasks-chip" onclick="setTaskFilter('status','보류',this)">보류</button>

      </select>

        <option value="">담당자 전체</option>

<script>
(function () {
  let allTasks = [];
  let taskPeriod = 'weekly';
  let taskFilter = { status: '전체' };
  let metricFilter = ''; // '', '진행중', '완료', '__urgent__', '__delayed__'

  const DAYS = ['일','월','화','수','목','금','토'];

  async function initTasks() {
    await fetchTasks();
    buildDynamicFilters();
    buildWeekFilter();
    renderTasks();
  }

  async function fetchTasks() {
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/tasks?order=지시일.desc`, {
        headers: { apikey: SUPABASE_ANON_KEY, Authorization: 'Bearer ' + SUPABASE_ANON_KEY }
      });
      allTasks = await res.json();
    } catch(e) { allTasks = []; }
  }

  // 날짜 포맷: mm/dd (요일)
  function fmtDate(str) {
    if (!str) return '';
    const d = new Date(str);
    if (isNaN(d)) return str;
    return `${d.getMonth()+1}/${String(d.getDate()).padStart(2,'0')} (${DAYS[d.getDay()]})`;
  }

  // 진행률 컬러
  function progressColor(pct, status) {
    if (status === '완료') return '#639922';
    if (status === '보류') return '#D3D1C7';
    if (pct >= 70) return '#378ADD';
    if (pct >= 30) return '#EF9F27';
    return '#E24B4A';
  }

  // 동적 필터 빌드 (현재 선택값 기준으로 옵션 축소)
  function buildDynamicFilters() {
    const cat = document.getElementById('filter-category')?.value || '';
    const pri = document.getElementById('filter-priority')?.value || '';

    // 담당자: 카테고리+우선순위 조건에 맞는 것만
    const filteredForAssignee = allTasks.filter(t => {
      if (taskFilter.status !== '전체' && t.진행상태 !== taskFilter.status) return false;
      if (cat && t.카테고리 !== cat) return false;
      if (pri && t.우선순위 !== pri) return false;
      return true;
    });
    const assignees = [...new Set(filteredForAssignee.map(t => t.담당자).filter(Boolean))].sort();
    const assigneeSel = document.getElementById('filter-assignee');
    const curAssignee = assigneeSel?.value || '';
    assigneeSel.innerHTML = '<option value="">담당자 전체</option>';
    assignees.forEach(n => {
      const opt = document.createElement('option');
      opt.value = n; opt.textContent = n;
      if (n === curAssignee) opt.selected = true;
      assigneeSel.appendChild(opt);
    });
  }

  function buildWeekFilter() {
    const sel = document.getElementById('filter-week');
    const cur = sel?.value || '';
    const label = taskPeriod === 'monthly' ? '월' : '주차';
    const keys = taskPeriod === 'monthly'
      ? [...new Set(allTasks.map(t => t.주차?.slice(0,7)).filter(Boolean))].sort().reverse()
      : [...new Set(allTasks.map(t => t.주차).filter(Boolean))].sort().reverse();
    sel.innerHTML = `<option value="">기간 전체</option>`;
    keys.forEach(w => {
      const opt = document.createElement('option');
      opt.value = w; opt.textContent = w;
      if (w === cur) opt.selected = true;
      sel.appendChild(opt);
    });
  }

  // 필터 적용
  function getFiltered() {
    const cat      = document.getElementById('filter-category')?.value || '';
    const pri      = document.getElementById('filter-priority')?.value || '';
    const assignee = document.getElementById('filter-assignee')?.value || '';
    const week     = document.getElementById('filter-week')?.value || '';
    const today    = new Date(); today.setHours(0,0,0,0);
    const in3days  = new Date(today); in3days.setDate(today.getDate() + 3);

    return allTasks.filter(t => {
      if (taskFilter.status !== '전체' && t.진행상태 !== taskFilter.status) return false;
      if (cat      && t.카테고리 !== cat)      return false;
      if (pri      && t.우선순위 !== pri)      return false;
      if (assignee && t.담당자   !== assignee) return false;
      if (week) {
        const key = taskPeriod === 'monthly' ? t.주차?.slice(0,7) : t.주차;
        if (key !== week) return false;
      }
      // 메트릭 필터
      if (metricFilter === '진행중' && t.진행상태 !== '진행중') return false;
      if (metricFilter === '완료'   && t.진행상태 !== '완료')   return false;
      if (metricFilter === '__urgent__') {
        const dl = t.변경_마감일 || t.기존_마감일;
        if (!dl || t.진행상태 === '완료') return false;
        const d = new Date(dl);
        if (!(d >= today && d <= in3days)) return false;
      }
      if (metricFilter === '__delayed__' && !t.변경_마감일) return false;
      return true;
    });
  }

  // 요약 카드 업데이트
  function updateMetrics(allFiltered) {
    const today   = new Date(); today.setHours(0,0,0,0);
    const in3days = new Date(today); in3days.setDate(today.getDate() + 3);
    // 메트릭은 메트릭필터 제외하고 계산
    const base = allTasks.filter(t => {
      const cat      = document.getElementById('filter-category')?.value || '';
      const pri      = document.getElementById('filter-priority')?.value || '';
      const assignee = document.getElementById('filter-assignee')?.value || '';
      const week     = document.getElementById('filter-week')?.value || '';
      if (taskFilter.status !== '전체' && t.진행상태 !== taskFilter.status) return false;
      if (cat      && t.카테고리 !== cat)      return false;
      if (pri      && t.우선순위 !== pri)      return false;
      if (assignee && t.담당자   !== assignee) return false;
      if (week) {
        const key = taskPeriod === 'monthly' ? t.주차?.slice(0,7) : t.주차;
        if (key !== week) return false;
      }
      return true;
    });

    document.getElementById('tm-total').textContent  = base.length;
    document.getElementById('tm-active').textContent = base.filter(t => t.진행상태 === '진행중').length;
    document.getElementById('tm-done').textContent   = base.filter(t => t.진행상태 === '완료').length;
    document.getElementById('tm-delayed').textContent= base.filter(t => t.변경_마감일).length;
    const urgent = base.filter(t => {
      const dl = t.변경_마감일 || t.기존_마감일;
      if (!dl || t.진행상태 === '완료') return false;
      const d = new Date(dl);
      return d >= today && d <= in3days;
    }).length;
    document.getElementById('tm-urgent').textContent = urgent;

    // 활성 메트릭 카드 표시
    ['all','active','done','urgent','delayed'].forEach(k => {
      document.getElementById('metric-'+k)?.classList.remove('active-metric');
    });
    const metricMap = { '진행중':'active', '완료':'done', '__urgent__':'urgent', '__delayed__':'delayed', '':'all' };
    if (metricFilter !== '') document.getElementById('metric-'+(metricMap[metricFilter]||'all'))?.classList.add('active-metric');
  }

  // 필터 라벨 표시
  function updateFilterLabel() {
    const cat      = document.getElementById('filter-category')?.value || '';
    const pri      = document.getElementById('filter-priority')?.value || '';
    const assignee = document.getElementById('filter-assignee')?.value || '';
    const week     = document.getElementById('filter-week')?.value || '';
    const metricLabels = { '진행중':'진행중', '완료':'완료', '__urgent__':'기한임박', '__delayed__':'연기됨' };

    const parts = [];
    if (taskFilter.status !== '전체') parts.push(`상태: <span>${taskFilter.status}</span>`);
    if (metricFilter) parts.push(`${metricLabels[metricFilter]||''} 필터`);
    if (cat)      parts.push(`카테고리: <span>${cat}</span>`);
    if (pri)      parts.push(`우선순위: <span>${pri}</span>`);
    if (assignee) parts.push(`담당자: <span>${assignee}</span>`);
    if (week)     parts.push(`기간: <span>${week}</span>`);

    const el = document.getElementById('tasks-filter-label');
    if (parts.length === 0) {
      el.style.display = 'none';
    } else {
      el.style.display = 'flex';
      el.innerHTML = '필터: ' + parts.join(' &nbsp;·&nbsp; ')
        + `<button class="clear-btn" onclick="clearAllFilters()">전체 초기화</button>`;
    }
  }

  // 카드 HTML
  function buildCard(t) {
    const isDelayed = !!t.변경_마감일;
    const statusKey = isDelayed && t.진행상태 !== '완료' ? '연기됨' : t.진행상태;
    const pct       = Number(t.진행률) || 0;
    const color     = progressColor(pct, t.진행상태);

    const deadlineHtml = isDelayed
      ? `<span class="deadline-label">마감</span>
         <span class="original-date">${fmtDate(t.기존_마감일)}</span>
         <span style="font-size:11px;color:#aaa">→</span>
         <span class="new-date">${fmtDate(t.변경_마감일)}</span>
         ${t.연기_사유 ? `<span class="reason-chip">${t.연기_사유}</span>` : ''}`
      : `<span class="deadline-label">마감</span>
         <span class="task-meta-item">${fmtDate(t.기존_마감일)}</span>`;

    const completeHtml = t.진행상태 === '완료' && t.실제_완료일
      ? `<div class="complete-row">✅ 실제 완료 ${fmtDate(t.실제_완료일)}</div>` : '';

    const noteHtml = t.진행내용
      ? `<div class="task-note">📝 ${t.진행내용}</div>` : '';

    const refHtml = t.참고자료_링크
      ? `<a class="task-ref" href="${t.참고자료_링크}" target="_blank">🔗 참고자료</a>` : '';

    return `
<div class="task-card">
  <div class="task-card-top">
    <div class="task-title-wrap">
      <div class="task-title-row">
        <div class="task-dot" style="background:${color}"></div>
        <span class="task-title">${t.업무명}</span>
      </div>
      ${t.카테고리 ? `<span class="cat-chip cat-${t.카테고리}" style="margin-left:15px;">${t.카테고리}</span>` : ''}
    </div>
    <div class="task-badges">
      <span class="status-badge status-${statusKey}">${statusKey}</span>
      <span class="pri-badge pri-${t.우선순위||'보통'}">${t.우선순위||'보통'}</span>
    </div>
  </div>
  <div class="task-meta-row">
    <span class="task-meta-item">👤 ${t.담당자||'-'}</span>
    <div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap;">${deadlineHtml}</div>
  </div>
  <div class="progress-wrap">
    <span style="font-size:11px;color:var(--text-secondary,#888)">진행률</span>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${color}"></div></div>
    <span class="progress-pct">${pct}%</span>
  </div>
  ${completeHtml}
  ${noteHtml}
  ${refHtml}
</div>`;
  }

  // 렌더링
  window.renderTasks = function () {
    buildDynamicFilters();
    const filtered = getFiltered();
    updateMetrics(filtered);
    updateFilterLabel();

    const list = document.getElementById('tasks-list');
    if (filtered.length === 0) {
      list.innerHTML = '<div class="tasks-empty">해당하는 업무가 없습니다.</div>';
      return;
    }

    // 주차/월별 그룹핑
    const groups = {};
    filtered.forEach(t => {
      const key = taskPeriod === 'monthly'
        ? (t.주차?.slice(0,7) || '기타')
        : (t.주차 || '기타');
      if (!groups[key]) groups[key] = [];
      groups[key].push(t);
    });

    const sortedKeys = Object.keys(groups).sort().reverse();
    list.innerHTML = sortedKeys.map(week => {
      const cards = groups[week].map(buildCard).join('');
      const label = taskPeriod === 'monthly' ? week+'월' : week;
      return `
<div class="tasks-week-section">
  <div class="tasks-week-divider">
    <span>${label}</span>
    <span class="tasks-week-count">${groups[week].length}건</span>
  </div>
  <div class="tasks-grid">${cards}</div>
</div>`;
    }).join('');
  };

  window.setTaskPeriod = function (period, btn) {
    taskPeriod = period;
    document.querySelectorAll('.tasks-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    buildWeekFilter();
    renderTasks();
  };

  window.setTaskFilter = function (key, val, btn) {
    taskFilter[key] = val;
    metricFilter = '';
    if (btn) {
      btn.closest('.tasks-status-chips')?.querySelectorAll('.tasks-chip').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }
    renderTasks();
  };

  window.onMetricClick = function (type) {
    metricFilter = metricFilter === type ? '' : type;
    renderTasks();
  };

  window.onFilterChange = function () {
    buildDynamicFilters();
    renderTasks();
  };

  window.clearAllFilters = function () {
    metricFilter = '';
    taskFilter = { status: '전체' };
    document.getElementById('filter-category').value = '';
    document.getElementById('filter-priority').value = '';
    document.getElementById('filter-week').value = '';
    document.querySelectorAll('.tasks-chip').forEach((b,i) => {
      b.classList.toggle('active', i === 0);
    });
    buildDynamicFilters();
    renderTasks();
  };

  // SPA 라우팅 연동
  const _orig = window.selectNav;
  window.selectNav = function (menu) {
    _orig && _orig(menu);
    if (menu === '업무현황') setTimeout(initTasks, 50);
  };

  initTasks();
})();
</script>
