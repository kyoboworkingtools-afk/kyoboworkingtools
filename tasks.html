.pri-보통 { background:#F1EFE8; color:#5F5E5A; }
.pri-낮음 { background:#EAF3DE; color:#3B6D11; }

.update-text {

  max-width: 160px; line-height: 1.5; text-align: right;
}
.tasks-loading { text-align: center; color: var(--text-secondary, #888); padding: 2rem; font-size: 14px; }
.tasks-empty   { text-align: center; color: var(--text-secondary, #888); padding: 2rem; font-size: 14px; }

<script>
(function () {
  // ── 상태 ──────────────────────────────
  let allTasks   = [];
  let taskPeriod = 'weekly';   // 'weekly' | 'monthly'
  let taskFilter = { status: '전체' };

  // ── 초기화 ────────────────────────────
  async function initTasks() {
    await fetchTasks();
    buildAssigneeFilter();
    buildWeekFilter();
    renderTasks();
  }

  // ── Supabase에서 데이터 fetch ──────────
  async function fetchTasks() {
    try {
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/tasks?order=지시일.desc`,
        {
          headers: {
            apikey: SUPABASE_ANON_KEY,
            Authorization: 'Bearer ' + SUPABASE_ANON_KEY,
          },
        }
      );
      allTasks = await res.json();
    } catch (e) {
      console.error('tasks fetch 오류:', e);
      allTasks = [];
    }
  }

  // ── 담당자 필터 옵션 자동 생성 ────────
  function buildAssigneeFilter() {
    const sel  = document.getElementById('filter-assignee');
    const names = [...new Set(allTasks.map(t => t.담당자).filter(Boolean))].sort();
    names.forEach(n => {
      const opt = document.createElement('option');
      opt.value = n; opt.textContent = n;
      sel.appendChild(opt);
    });
  }

  // ── 주차/월 필터 옵션 자동 생성 ───────
  function buildWeekFilter() {
    const sel = document.getElementById('filter-week');
    const weeks = [...new Set(allTasks.map(t => t.주차).filter(Boolean))].sort().reverse();
    weeks.forEach(w => {
      const opt = document.createElement('option');
      opt.value = w; opt.textContent = w;
      sel.appendChild(opt);
    });
  }

  // ── 필터 적용 ──────────────────────────
  function getFiltered() {
    const cat      = document.getElementById('filter-category')?.value || '';
    const pri      = document.getElementById('filter-priority')?.value || '';
    const assignee = document.getElementById('filter-assignee')?.value || '';
    const week     = document.getElementById('filter-week')?.value || '';

    return allTasks.filter(t => {
      if (taskFilter.status !== '전체' && t.진행상태 !== taskFilter.status) return false;
      if (cat      && t.카테고리 !== cat)      return false;
      if (pri      && t.우선순위 !== pri)      return false;
      if (assignee && t.담당자   !== assignee) return false;
      if (week     && t.주차     !== week)     return false;
      return true;
    });
  }

  // ── 요약 카드 업데이트 ────────────────
  function updateMetrics(tasks) {
    const today   = new Date(); today.setHours(0,0,0,0);
    const in3days = new Date(today); in3days.setDate(today.getDate() + 3);

    document.getElementById('tm-total').textContent  = tasks.length;
    document.getElementById('tm-active').textContent = tasks.filter(t => t.진행상태 === '진행중').length;
    document.getElementById('tm-done').textContent   = tasks.filter(t => t.진행상태 === '완료').length;
    document.getElementById('tm-delayed').textContent= tasks.filter(t => t.변경_마감일).length;

    const urgent = tasks.filter(t => {
      const deadline = t.변경_마감일 || t.기존_마감일;
      if (!deadline || t.진행상태 === '완료') return false;
      const d = new Date(deadline);
      return d >= today && d <= in3days;
    }).length;
    document.getElementById('tm-urgent').textContent = urgent;
  }

  // ── 진행률 컬러 ───────────────────────
  function progressColor(pct, status) {
    if (status === '완료')  return '#639922';
    if (status === '보류')  return '#D3D1C7';
    if (pct >= 70) return '#378ADD';
    if (pct >= 30) return '#EF9F27';
    return '#E24B4A';
  }

  // ── 날짜 포맷 (yyyy-mm-dd → mm/dd) ───
  function fmtDate(str) {
    if (!str) return '';
    const d = new Date(str);
    if (isNaN(d)) return str;
    return `${d.getMonth()+1}/${String(d.getDate()).padStart(2,'0')}`;
  }

  // ── 카드 HTML 생성 ────────────────────
  function buildCard(t) {
    const isDelayed = !!t.변경_마감일;
    const deadline  = isDelayed ? t.변경_마감일 : t.기존_마감일;
    const statusKey = isDelayed && t.진행상태 !== '완료' ? '연기됨' : t.진행상태;
    const pct       = Number(t.진행률) || 0;
    const color     = progressColor(pct, t.진행상태);

    const deadlineHtml = isDelayed
      ? `<span class="original-date">${fmtDate(t.기존_마감일)}</span>
         <span style="font-size:12px;color:#aaa">→</span>
         <span class="new-date">${fmtDate(t.변경_마감일)}</span>
         ${t.연기_사유 ? `<span class="reason-chip">${t.연기_사유}</span>` : ''}`
      : `<span class="task-meta-item">📅 ${fmtDate(t.기존_마감일)}</span>`;

    const completeHtml = t.진행상태 === '완료' && t.실제_완료일
      ? `<div class="complete-row">✅ 실제 완료일 ${fmtDate(t.실제_완료일)}</div>` : '';

    const noteHtml = t.진행내용
      ? `<div class="task-note">📝 ${t.진행내용}</div>` : '';

    const refHtml = t.참고자료_링크
      ? `<a class="task-ref" href="${t.참고자료_링크}" target="_blank">🔗 참고자료</a>` : '';

    const updateHtml = t.진행내용
      ? `<div class="update-text">${t.진행내용.length > 30 ? t.진행내용.slice(0,30)+'…' : t.진행내용}</div>` : '';

    return `
<div class="task-card">
  <div class="task-dot" style="background:${color}"></div>
  <div class="task-main">
    <div class="task-title-row">
      <span class="task-title">${t.업무명}</span>
      ${t.카테고리 ? `<span class="cat-chip cat-${t.카테고리}">${t.카테고리}</span>` : ''}
    </div>
    <div class="task-meta">
      <span class="task-meta-item">👤 ${t.담당자 || '-'}</span>
      <div class="deadline-row">${deadlineHtml}</div>
    </div>
    <div class="progress-wrap">
      <span style="font-size:12px;color:var(--text-secondary,#888)">진행률</span>
      <div class="progress-bar">
        <div class="progress-fill" style="width:${pct}%;background:${color}"></div>
      </div>
      <span style="font-size:12px;color:var(--text-secondary,#888)">${pct}%</span>
    </div>
    ${completeHtml}
    ${noteHtml}
    ${refHtml}
  </div>
  <div class="task-right">
    <span class="pri-badge pri-${t.우선순위 || '보통'}">우선순위 ${t.우선순위 || '보통'}</span>
    <span class="status-badge status-${statusKey}">${statusKey}</span>
    ${updateHtml}
  </div>
</div>`;
  }

  // ── 렌더링 ────────────────────────────
  window.renderTasks = function () {
    const filtered = getFiltered();
    updateMetrics(filtered);

    const list = document.getElementById('tasks-list');
    if (filtered.length === 0) {
      list.innerHTML = '<div class="tasks-empty">해당하는 업무가 없습니다.</div>';
      return;
    }

    // 주차별 그룹핑
    const groups = {};
    filtered.forEach(t => {
      const key = t.주차 || '기타';
      if (!groups[key]) groups[key] = [];
      groups[key].push(t);
    });

    const sortedKeys = Object.keys(groups).sort().reverse();
    list.innerHTML = sortedKeys.map(week => {
      const cards = groups[week].map(buildCard).join('');
      return `<div class="tasks-week-divider">${week}</div>${cards}`;
    }).join('');
  };

  // ── 외부에서 호출되는 함수들 ──────────
  window.setTaskPeriod = function (period, btn) {
    taskPeriod = period;
    document.querySelectorAll('.tasks-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderTasks();
  };

  window.setTaskFilter = function (key, val, btn) {
    taskFilter[key] = val;
    if (btn) {
      btn.closest('.tasks-status-chips')
        ?.querySelectorAll('.tasks-chip')
        .forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }
    renderTasks();
  };

  // ── SPA 라우팅 연동: selectNav 호출 시 초기화 ──
  // 기존 selectNav 함수를 감싸서 업무현황 진입 시 데이터 로드
  const _origSelectNav = window.selectNav;
  window.selectNav = function (menu) {
    _origSelectNav && _origSelectNav(menu);
    if (menu === '업무현황') {
      setTimeout(initTasks, 50);
    }
  };

  // 페이지가 이미 업무현황이면 바로 초기화
  if (document.getElementById('page-tasks')?.style.display !== 'none') {
    initTasks();
  }
})();
</script>
