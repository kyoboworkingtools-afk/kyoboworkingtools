<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>업무 툴 포털</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root {
  --bg:#f4f6f9;--sidebar-bg:#ffffff;--surface:#ffffff;--surface2:#f0f2f5;
  --border:#e2e6ed;--border2:#d0d5de;
  --text:#1a1f2e;--muted:#5a6478;--dim:#9aa0b0;
  --accent:#1a6fd4;--c-mugu:#2563eb;--c-music:#dc2626;
  --c-etc:#7c3aed;--c-settle:#0891b2;--c-data:#ea580c;
  --c-analysis:#16a34a;--c-schedule:#db2777;--c-dash:#0369a1;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{display:flex;flex-direction:column;height:100dvh;background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;overflow:hidden;}

/* TOPBAR */
.topbar{display:flex;align-items:center;height:54px;background:var(--sidebar-bg);border-bottom:1px solid var(--border);padding:0 16px;gap:12px;flex-shrink:0;z-index:20;}
.menu-btn{width:36px;height:36px;border-radius:8px;background:var(--surface);border:1px solid var(--border2);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;color:var(--muted);font-size:15px;user-select:none;}
.menu-btn:hover{border-color:var(--accent);color:var(--accent);}
.topbar-logo{font-size:14px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:7px;white-space:nowrap;}
.topbar-logo .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);}
.topbar-divider{width:1px;height:20px;background:var(--border2);flex-shrink:0;}
.topbar-search{flex:1;position:relative;min-width:0;}
.topbar-search input{width:100%;background:var(--surface);border:1px solid var(--border2);border-radius:7px;padding:8px 12px 8px 34px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:12px;outline:none;transition:border-color .2s,box-shadow .2s;}
.topbar-search input::placeholder{color:var(--dim);}
.topbar-search input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(232,197,71,.08);}
.topbar-search .si{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--dim);}
.topbar-right{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.topbar-date{font-family:'DM Mono',monospace;font-size:10px;color:var(--dim);letter-spacing:1px;display:none;}
.topbar-user{font-size:11px;color:var(--muted);background:var(--surface);border:1px solid var(--border2);padding:5px 10px;border-radius:20px;white-space:nowrap;}
@media(min-width:600px){.topbar{padding:0 20px;gap:14px;}.topbar-date{display:block;}}

/* LAYOUT */
.layout{display:flex;flex:1;overflow:hidden;position:relative;}

/* SIDEBAR OVERLAY */
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:30;}
.sidebar-overlay.show{display:block;}

/* SIDEBAR */
.sidebar{position:fixed;top:54px;left:0;bottom:0;width:224px;background:var(--sidebar-bg);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;padding:14px 0 24px;z-index:31;transform:translateX(-100%);transition:transform .25s cubic-bezier(.4,0,.2,1);}
.sidebar.open{transform:translateX(0);}
.sidebar::-webkit-scrollbar{width:3px;}
.sidebar::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
@media(min-width:768px){
  .sidebar{position:relative;top:auto;left:auto;bottom:auto;transform:translateX(0)!important;}
  .sidebar-overlay{display:none!important;}
}

.sidebar-section-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2.5px;color:var(--dim);text-transform:uppercase;padding:0 18px;margin-bottom:4px;margin-top:16px;}
.sidebar-section-label:first-child{margin-top:0;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 18px;cursor:pointer;border-left:2px solid transparent;transition:all .15s;font-size:13px;color:var(--muted);user-select:none;}
.nav-item:hover{background:var(--surface);color:var(--text);}
.nav-item.active{background:var(--surface);color:var(--text);border-left-color:var(--nav-color,var(--accent));}
.nav-dot{width:7px;height:7px;border-radius:50%;background:var(--nav-color,var(--dim));flex-shrink:0;}
.nav-item.active .nav-dot{box-shadow:0 0 6px var(--nav-color,var(--accent));}
.nav-count{margin-left:auto;font-family:'DM Mono',monospace;font-size:10px;color:var(--dim);background:var(--surface2);padding:2px 7px;border-radius:10px;}
.nav-arrow{margin-left:auto;font-size:10px;color:var(--dim);transition:transform .2s;}
.nav-item.etc-open .nav-arrow{transform:rotate(90deg);}
.nav-sub{display:none;}
.nav-sub.open{display:block;}
.nav-sub-item{display:flex;align-items:center;gap:10px;padding:8px 18px 8px 34px;cursor:pointer;font-size:12px;color:var(--dim);border-left:2px solid transparent;transition:all .15s;}
.nav-sub-item:hover{color:var(--muted);background:rgba(255,255,255,.02);}
.nav-sub-item.active{color:var(--text);border-left-color:var(--nav-color,var(--accent));}
.sub-dot{width:5px;height:5px;border-radius:50%;background:var(--nav-color,var(--dim));flex-shrink:0;}
.sub-count{margin-left:auto;font-family:'DM Mono',monospace;font-size:10px;color:var(--dim);}
.sidebar-divider{height:1px;background:var(--border);margin:12px 18px;}

/* MAIN */
.main{flex:1;overflow-y:auto;padding:20px 16px 32px;background:var(--bg);min-width:0;}
.main::-webkit-scrollbar{width:5px;}
.main::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
@media(min-width:600px){.main{padding:24px 24px 40px;}}
@media(min-width:1024px){.main{padding:28px 32px 48px;}}

/* ── TOOL VIEWER (iframe overlay) ── */
.tool-viewer{
  display:none;position:fixed;inset:0;z-index:200;
  flex-direction:column;background:var(--bg);
}
.tool-viewer.open{display:flex;}
.tool-viewer-bar{
  display:flex;align-items:center;gap:12px;
  height:50px;padding:0 16px;flex-shrink:0;
  background:var(--sidebar-bg);border-bottom:1px solid var(--border);
}
.tv-back{
  display:flex;align-items:center;gap:6px;
  padding:6px 14px;border-radius:7px;cursor:pointer;
  background:var(--surface);border:1px solid var(--border2);
  font-size:12px;color:var(--muted);font-family:'Noto Sans KR',sans-serif;
  transition:all .15s;white-space:nowrap;
}
.tv-back:hover{border-color:var(--accent);color:var(--accent);}
.tv-title{font-size:13px;font-weight:700;color:var(--text);}
.tv-badge{font-size:10px;padding:3px 9px;border-radius:20px;margin-left:4px;}
.tv-iframe{flex:1;border:none;background:#fff;}

/* RECENT */
.recent-bar{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:22px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.recent-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--dim);letter-spacing:1.5px;white-space:nowrap;}
.recent-chips{display:flex;gap:7px;flex-wrap:wrap;}
.recent-chip{display:flex;align-items:center;gap:5px;padding:5px 11px;background:var(--surface2);border:1px solid var(--border2);border-radius:5px;font-size:11px;color:var(--muted);cursor:pointer;transition:all .15s;}
.recent-chip:hover{border-color:var(--accent);color:var(--accent);}
.rc-dot{width:5px;height:5px;border-radius:50%;}

/* PAGE HEADER */
.page-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:18px;}
.page-category-tag{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--page-color,var(--accent));margin-bottom:5px;opacity:.8;}
.page-title{font-size:20px;font-weight:700;letter-spacing:-.5px;}
.page-tool-count{font-family:'DM Mono',monospace;font-size:11px;color:var(--dim);}

/* SUB SECTION */
.sub-section{margin-bottom:30px;}
.sub-section-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border);}
.sub-section-dot{width:8px;height:8px;border-radius:50%;}
.sub-section-title{font-size:12px;font-weight:600;color:var(--muted);letter-spacing:.5px;}
.sub-section-count{font-family:'DM Mono',monospace;font-size:10px;color:var(--dim);margin-left:auto;}

/* TOOL CARDS */
.tools-grid{display:grid;grid-template-columns:1fr;gap:12px;}
@media(min-width:480px){.tools-grid{grid-template-columns:repeat(2,1fr);}}
@media(min-width:900px){.tools-grid{grid-template-columns:repeat(3,1fr);}}
@media(min-width:1200px){.tools-grid{grid-template-columns:repeat(4,1fr);}}

.tool-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px;cursor:pointer;transition:all .2s ease;position:relative;overflow:hidden;animation:fadeUp .3s ease both;}
.tool-card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--card-color,var(--accent));transform:scaleX(0);transform-origin:left;transition:transform .25s ease;}
.tool-card:hover{border-color:var(--card-color,var(--accent));background:var(--surface2);transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.25);}
.tool-card:hover::after{transform:scaleX(1);}

/* 연결된 카드 표시 */
.tool-card.linked{border-color:var(--border2);}
.tool-card.linked::before{content:'';position:absolute;top:10px;right:10px;width:6px;height:6px;border-radius:50%;background:var(--c-analysis);box-shadow:0 0 6px var(--c-analysis);}

.card-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;margin-bottom:12px;background:var(--icon-bg,rgba(232,197,71,.1));}
.card-cat{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--card-color,var(--accent));text-transform:uppercase;margin-bottom:5px;opacity:.7;}
.card-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:6px;letter-spacing:-.2px;}
.card-desc{font-size:11px;color:var(--muted);line-height:1.75;font-weight:300;}
.card-footer{margin-top:14px;padding-top:11px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.card-date{font-family:'DM Mono',monospace;font-size:9px;color:var(--dim);}
.card-badge{font-size:9px;padding:3px 8px;border-radius:20px;font-weight:600;letter-spacing:.5px;}
.badge-new{background:rgba(79,209,197,.12);color:#4fd1c5;border:1px solid rgba(79,209,197,.25);}
.badge-update{background:rgba(167,139,250,.12);color:#a78bfa;border:1px solid rgba(167,139,250,.25);}
.badge-stable{background:rgba(232,197,71,.08);color:#e8c547;border:1px solid rgba(232,197,71,.2);}
.badge-linked{background:rgba(52,211,153,.12);color:#34d399;border:1px solid rgba(52,211,153,.25);}

.add-card{background:transparent;border:1px dashed var(--border2);border-radius:10px;padding:18px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;min-height:130px;transition:all .2s;color:var(--dim);font-size:12px;}
.add-card:hover{border-color:var(--accent);color:var(--accent);background:rgba(232,197,71,.03);}
.empty-state{text-align:center;padding:60px 20px;color:var(--dim);}

/* DASHBOARD */
.meta-row{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.meta-tag{font-family:'DM Mono',monospace;font-size:9px;color:var(--dim);background:var(--surface2);border:1px solid var(--border);padding:3px 9px;border-radius:4px;}
.refresh-btn{font-family:'DM Mono',monospace;font-size:9px;color:var(--accent);background:transparent;border:1px solid rgba(232,197,71,.4);padding:3px 9px;border-radius:4px;cursor:pointer;}
.refresh-btn:hover{background:rgba(232,197,71,.08);}
.summary-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:18px;}
.sum-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;}
.sum-num{font-family:'DM Mono',monospace;font-size:16px;font-weight:500;margin-bottom:4px;}
.sum-label{font-size:10px;color:var(--dim);letter-spacing:.5px;}
.bar-section{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:18px;}
.bar-title{font-size:11px;font-weight:600;color:var(--muted);margin-bottom:14px;letter-spacing:.5px;}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.bar-label{width:20px;font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;}
.bar-track{flex:1;height:16px;background:var(--border);border-radius:4px;overflow:hidden;}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--c-data));border-radius:4px;transition:width .8s ease;}
.bar-val{font-size:10px;color:var(--muted);width:86px;text-align:right;font-family:'DM Mono',monospace;}
.bar-qty{font-size:10px;color:var(--dim);width:44px;text-align:right;}
.filter-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px;align-items:center;}
.filter-sep{width:1px;height:14px;background:var(--border2);margin:0 2px;}
.filter-label{font-size:10px;color:var(--dim);}
.f-chip{padding:5px 12px;border-radius:20px;font-size:11px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .15s;border:1px solid var(--border2);background:transparent;color:var(--muted);}
.f-chip.active{font-weight:700;}
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:auto;margin-bottom:18px;}
table{width:100%;border-collapse:collapse;}
th{padding:9px 14px;text-align:left;font-size:10px;color:var(--dim);font-family:'DM Mono',monospace;letter-spacing:1px;border-bottom:1px solid var(--border);background:var(--surface2);white-space:nowrap;}
td{padding:9px 14px;font-size:12px;border-bottom:1px solid var(--border);color:var(--text);}
tr:last-child td{border-bottom:none;}
tfoot td{background:var(--surface2);font-weight:700;font-size:11px;}
.cat-badge{padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;}
.legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px;}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);}
.legend-dot{width:8px;height:8px;border-radius:2px;}
.legend-sep{width:1px;height:14px;background:var(--border2);margin:0 2px;}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px;}
.view-btns{display:flex;gap:6px;}
.view-btn{padding:5px 13px;border-radius:6px;font-size:11px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;border:1px solid var(--border2);background:transparent;color:var(--muted);transition:all .15s;}
.view-btn.active{background:var(--c-dash);border-color:var(--c-dash);color:#0d0f14;font-weight:700;}
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
.week-col{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px;min-height:100px;}
.week-col.today{background:rgba(125,211,252,.06);border-color:var(--c-dash);}
.week-day{font-size:10px;color:var(--dim);margin-bottom:3px;font-family:'DM Mono',monospace;}
.week-col.today .week-day{color:var(--c-dash);}
.week-date{font-size:15px;font-weight:700;color:var(--text);margin-bottom:6px;}
.week-col.today .week-date{color:var(--c-dash);}
.ev-pill{padding:3px 6px;border-radius:4px;font-size:10px;margin-bottom:3px;border-left:2px solid;overflow:hidden;}
.ev-title-t{font-weight:600;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ev-time{opacity:.7;font-size:9px;}
.month-day-names{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:3px;}
.month-day-name{text-align:center;font-size:10px;color:var(--dim);padding:4px 0;font-family:'DM Mono',monospace;}
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.month-cell{min-height:58px;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:6px;}
.month-cell.today{background:rgba(125,211,252,.06);border-color:var(--c-dash);}
.month-cell-day{font-size:11px;color:var(--muted);margin-bottom:3px;}
.month-cell.today .month-cell-day{color:var(--c-dash);font-weight:700;}
.month-ev{font-size:9px;padding:2px 5px;border-radius:3px;margin-bottom:2px;border-left:2px solid;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.month-more{font-size:9px;color:var(--dim);}
.ev-list{margin-top:18px;}
.ev-list-title{font-size:11px;font-weight:600;color:var(--muted);margin-bottom:10px;letter-spacing:.5px;}
.ev-list-item{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 14px;display:flex;align-items:center;gap:12px;margin-bottom:6px;}
.ev-list-date{font-family:'DM Mono',monospace;font-size:10px;color:var(--dim);min-width:42px;}
.ev-list-title-text{flex:1;font-size:12px;font-weight:500;}
.ev-badge{font-size:9px;padding:2px 8px;border-radius:10px;}
.load-box{text-align:center;padding:60px 20px;color:var(--muted);}
.spinner{width:26px;height:26px;border:2px solid var(--border2);border-top:2px solid var(--accent);border-radius:50%;margin:0 auto 12px;animation:spin .8s linear infinite;}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="menu-btn" onclick="toggleSidebar()">☰</div>
  <div class="topbar-logo"><span class="dot"></span>업무 포털</div>
  <div class="topbar-divider"></div>
  <div class="topbar-search">
    <span class="si">🔍</span>
    <input type="text" placeholder="툴 검색..." id="searchInput" oninput="handleSearch()">
  </div>
  <div class="topbar-right">
    <span class="topbar-date" id="topDate"></span>
    <span class="topbar-user">음반사업팀 · 대리</span>
  </div>
</div>

<div class="layout">
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

  <!-- SIDEBAR -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-section-label">대시보드</div>
    <div class="nav-item active" style="--nav-color:var(--c-dash);" onclick="selectNav('dash-inv',this)">
      <span class="nav-dot" style="background:var(--c-dash)"></span>재고 현황
    </div>
    <div class="nav-item" style="--nav-color:var(--c-schedule);" onclick="selectNav('dash-cal',this)">
      <span class="nav-dot" style="background:var(--c-schedule)"></span>일정 현황
    </div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section-label">파트</div>
    <div class="nav-item" style="--nav-color:var(--c-music);" onclick="selectNav('music',this)">
      <span class="nav-dot" style="background:var(--c-music)"></span>음반
      <span class="nav-count" id="cnt-music">0</span>
    </div>
    <div class="sidebar-section-label" style="margin-top:14px;">기타</div>
    <div class="nav-item" style="--nav-color:var(--c-etc);" onclick="toggleEtc(this)" id="nav-etc">
      <span class="nav-dot" style="background:var(--c-etc)"></span>기타
      <span class="nav-count" id="cnt-etc">0</span>
      <span class="nav-arrow">▶</span>
    </div>
    <div class="nav-sub" id="sub-etc">
      <div class="nav-sub-item" style="--nav-color:var(--c-settle);" onclick="selectNav('settle',this)">
        <span class="sub-dot" style="background:var(--c-settle)"></span>정산<span class="sub-count" id="cnt-settle">0</span>
      </div>
      <div class="nav-sub-item" style="--nav-color:var(--c-data);" onclick="selectNav('jryo',this)">
        <span class="sub-dot" style="background:var(--c-data)"></span>자료<span class="sub-count" id="cnt-jryo">0</span>
      </div>
      <div class="nav-sub-item" style="--nav-color:var(--c-analysis);" onclick="selectNav('analysis',this)">
        <span class="sub-dot" style="background:var(--c-analysis)"></span>분석<span class="sub-count" id="cnt-analysis">0</span>
      </div>
      <div class="nav-sub-item" style="--nav-color:var(--c-schedule);" onclick="selectNav('schedule',this)">
        <span class="sub-dot" style="background:var(--c-schedule)"></span>일정<span class="sub-count" id="cnt-schedule">0</span>
      </div>
    </div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section-label">전체</div>
    <div class="nav-item" style="--nav-color:var(--accent);" onclick="selectNav('all',this)" id="nav-all">
      <span class="nav-dot" style="background:var(--accent)"></span>모든 툴
      <span class="nav-count" id="cnt-all">0</span>
    </div>
  </nav>

  <div class="main" id="mainArea"></div>
</div>

<!-- ── TOOL VIEWER ── -->

// 날짜 목록에서 최신/전주/전월마감 찾기
function getLatestDate(data){
  const dates=[...new Set(data.map(d=>d.date))].sort().reverse();
  return dates[0]||null;
}
function getPrevWeekDate(data,latest){
  const dates=[...new Set(data.map(d=>d.date))].sort().reverse();
  const idx=dates.indexOf(latest);
  return dates[idx+1]||null;
}
function getLatestClosingDate(data,latest){
  const closings=data.filter(d=>d.type==='마감'&&d.date<latest).map(d=>d.date).sort().reverse();
  return closings[0]||null;
}
function diffStr(curr,prev){
  if(prev==null)return '-';
  const d=curr-prev;
  if(d===0)return '±0';
  return d>0?`▲${fmt(d)}`:`▼${fmt(Math.abs(d))}`;
}
function diffColor(curr,prev){
  if(prev==null)return 'var(--dim)';
  return curr>prev?'#34d399':curr<prev?'#f08080':'var(--muted)';
}

const fmt=n=>(n||0).toLocaleString('ko-KR');
const typeColor={휴가:'#34d399',외부일정:'#fb923c',회의:'#a78bfa',기타:'#7a8299'};
const calColor={개인:'#e8c547',팀:'#f08080'};
const dayNames=['월','화','수','목','금','토','일'];

function getWeekDates(){
  const d=new Date(todayD),day=d.getDay();
  const mon=new Date(d);mon.setDate(d.getDate()-(day===0?6:day-1));
  return Array.from({length:7},(_,i)=>{const x=new Date(mon);x.setDate(mon.getDate()+i);return x;});
}
function toDateStr(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function getEventsForDate(date,events){return(events||[]).filter(e=>e.date===toDateStr(date));}
function getMonthCells(){
  const y=todayD.getFullYear(),m=todayD.getMonth();
  const fd=new Date(y,m,1).getDay(),dim=new Date(y,m+1,0).getDate();
  const offset=fd===0?6:fd-1;const cells=[];
  for(let i=0;i<offset;i++)cells.push(null);
  for(let d=1;d<=dim;d++)cells.push(d);
  return cells;
}

function renderBranchTab(){
  const data=dashInvData.branch||[];
  if(!data.length) return `<div class="empty-state">📭<br><br>데이터가 없습니다<br><span style="font-size:11px;color:var(--dim)">구글 시트에서 동기화 버튼을 눌러주세요</span></div>`;

  const latest=getLatestDate(data);
  const prevWeek=getPrevWeekDate(data,latest);
  const closing=getLatestClosingDate(data,latest);

  const latestData=data.filter(d=>d.date===latest);
  const prevData=data.filter(d=>d.date===prevWeek);
  const closeData=data.filter(d=>d.date===closing);

  // 필터
  const typeAs=['전체',...[...new Set(data.map(d=>d.type_a).filter(Boolean))].sort()];
  const typeBs=['전체',...[...new Set(data.map(d=>d.type_b).filter(Boolean))].sort()];
  const filtered=latestData.filter(d=>(invTypeA==='전체'||d.type_a===invTypeA)&&(invTypeB==='전체'||d.type_b===invTypeB));

  const totalQty=filtered.reduce((s,d)=>s+(d.quantity||0),0);
  const totalAmt=filtered.reduce((s,d)=>s+(d.amount||0),0);

  let html=`<div class="meta-row">
    <span class="meta-tag">📅 기준일: ${latest||'-'}</span>
    ${closing?`<span class="meta-tag">📌 전월마감: ${closing}</span>`:''}

  </div>
  <div class="summary-row">
    <div class="sum-card" style="border-top:2px solid var(--accent)"><div class="sum-num" style="color:var(--accent)">${fmt(totalAmt)}원</div><div class="sum-label">전체 재고금액</div></div>
    <div class="sum-card" style="border-top:2px solid var(--c-analysis)"><div class="sum-num" style="color:var(--c-analysis)">${fmt(totalQty)}개</div><div class="sum-label">전체 수량</div></div>
    <div class="sum-card" style="border-top:2px solid var(--c-dash)"><div class="sum-num" style="color:var(--c-dash)">${filtered.length}개</div><div class="sum-label">영업점 수</div></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px;">
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;">

    </div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;">
      <div style="font-size:12px;font-weight:600;color:var(--muted);margin-bottom:12px;">영업점 Top 10 재고금액</div>
      <canvas id="chartBranch" height="200"></canvas>
    </div>
  </div>
  <div class="filter-row">
    <span class="filter-label">구분A</span>
    ${typeAs.map(t=>`<button class="f-chip ${invTypeA===t?'active':''}" style="${invTypeA===t?'background:var(--accent);border-color:var(--accent);color:#fff':''}" onclick="invTypeA='${t}';renderDashInv()">${t}</button>`).join('')}
    <div class="filter-sep"></div>
    <span class="filter-label">구분B</span>
    ${typeBs.map(t=>`<button class="f-chip ${invTypeB===t?'active':''}" style="${invTypeB===t?'background:var(--c-dash);border-color:var(--c-dash);color:#fff':''}" onclick="invTypeB='${t}';renderDashInv()">${t}</button>`).join('')}
  </div>
  <div class="table-wrap"><table>
    <thead><tr>
      <th>영업점</th><th>구분A</th><th>구분B</th>

      <th style="text-align:right">전월마감比</th><th style="text-align:right">전주比</th>
    </tr></thead><tbody>`;

  filtered.forEach((d,i)=>{
    const prev=prevData.find(p=>p.branch===d.branch);
    const close=closeData.find(c=>c.branch===d.branch);
    const wkDiff=diffStr(d.amount,prev?.amount);
    const wkColor=diffColor(d.amount,prev?.amount);
    const clDiff=diffStr(d.amount,close?.amount);
    const clColor=diffColor(d.amount,close?.amount);
    html+=`<tr style="background:${i%2?'var(--surface2)':'transparent'}">

  </tr></tfoot></table></div>`;
  return html;
}

function createBranchCharts(){
  const data=dashInvData.branch||[];

  // 구분A 도넛 차트
  const typeAMap={};
  filtered.forEach(d=>{const k=d.type_a||'기타';typeAMap[k]=(typeAMap[k]||0)+(d.amount||0);});
  mkChart('chartTypeA',{type:'doughnut',data:{
    labels:Object.keys(typeAMap),
    datasets:[{data:Object.values(typeAMap),backgroundColor:CHART_COLORS,borderWidth:2,borderColor:'#fff'}]
  },options:{responsive:true,plugins:{legend:{position:'bottom',labels:{font:{size:11},padding:10}},tooltip:{callbacks:{label:ctx=>`${ctx.label}: ${fmt(ctx.raw)}원`}}}}});

  // 영업점 Top10 가로 막대 차트

  },options:{indexAxis:'y',responsive:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${fmt(ctx.raw)}원`}}},scales:{x:{ticks:{callback:v=>fmt(v),font:{size:9}},grid:{color:'rgba(0,0,0,.05)'}},y:{ticks:{font:{size:10}}}}}});
}

  const data=dashInvData.genre||[];
  const latest=getLatestDate(data);
  const closing=getLatestClosingDate(data,latest);
  const latestData=data.filter(d=>d.date===latest);
  const closeData=data.filter(d=>d.date===closing);
  const genres=[...new Set(latestData.map(d=>d.genre))].sort();
  const amts=genres.map(g=>latestData.filter(d=>d.genre===g).reduce((s,d)=>s+(d.amount||0),0));
  const closeAmts=genres.map(g=>closeData.filter(d=>d.genre===g).reduce((s,d)=>s+(d.amount||0),0));

  mkChart('chartGenrePie',{type:'doughnut',data:{
    labels:genres,
    datasets:[{data:amts,backgroundColor:CHART_COLORS,borderWidth:2,borderColor:'#fff'}]
  },options:{responsive:true,plugins:{legend:{position:'bottom',labels:{font:{size:11},padding:10}},tooltip:{callbacks:{label:ctx=>`${ctx.label}: ${fmt(ctx.raw)}원`}}}}});

  mkChart('chartGenreBar',{type:'bar',data:{
    labels:genres,
    datasets:[
      {label:'현재',data:amts,backgroundColor:'rgba(26,111,212,.2)',borderColor:'#1a6fd4',borderWidth:1.5,borderRadius:4},
      {label:'전월마감',data:closeAmts,backgroundColor:'rgba(220,38,38,.15)',borderColor:'#dc2626',borderWidth:1.5,borderRadius:4}
    ]
  },options:{responsive:true,plugins:{legend:{position:'bottom',labels:{font:{size:11}}},tooltip:{callbacks:{label:ctx=>`${ctx.dataset.label}: ${fmt(ctx.raw)}원`}}},scales:{y:{ticks:{callback:v=>fmt(v),font:{size:9}},grid:{color:'rgba(0,0,0,.05)'}},x:{ticks:{font:{size:11}}}}}});
}

function renderSupplierTab(){
  const data=dashInvData.supplier||[];
  if(!data.length) return `<div class="empty-state">📭<br><br>데이터가 없습니다</div>`;

  const latest=getLatestDate(data);
  const prevWeek=getPrevWeekDate(data,latest);
  const closing=getLatestClosingDate(data,latest);
  const latestData=data.filter(d=>d.date===latest);
  const prevData=data.filter(d=>d.date===prevWeek);
  const closeData=data.filter(d=>d.date===closing);

  let html=`<div class="meta-row">
    <span class="meta-tag">📅 기준일: ${latest||'-'}</span>
    ${closing?`<span class="meta-tag">📌 전월마감: ${closing}</span>`:''}
  </div>
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:18px;">
    <div style="font-size:12px;font-weight:600;color:var(--muted);margin-bottom:12px;">매입처 Top 10 재고금액</div>
    <canvas id="chartSupplier" height="120"></canvas>
  </div>
  <div class="table-wrap"><table>
    <thead><tr>
      <th>코드</th><th>매입처명</th>
      <th style="text-align:right">수량</th><th style="text-align:right">금액</th>
      <th style="text-align:right">전월마감比</th><th style="text-align:right">전주比</th>
    </tr></thead><tbody>`;

  latestData.sort((a,b)=>(b.amount||0)-(a.amount||0)).forEach((d,i)=>{
    const prev=prevData.find(p=>p.supplier_code===d.supplier_code&&p.supplier_name===d.supplier_name);
    const close=closeData.find(c=>c.supplier_code===d.supplier_code&&c.supplier_name===d.supplier_name);
    html+=`<tr style="background:${i%2?'var(--surface2)':'transparent'}">
      <td style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)">${d.supplier_code||'-'}</td>
      <td style="font-weight:500">${d.supplier_name}</td>
      <td style="font-family:'DM Mono',monospace;text-align:right">${fmt(d.quantity)}</td>
      <td style="font-family:'DM Mono',monospace;text-align:right;color:var(--accent);font-weight:600">${fmt(d.amount)}원</td>
      <td style="font-family:'DM Mono',monospace;text-align:right;color:${diffColor(d.amount,close?.amount)};font-size:11px">${diffStr(d.amount,close?.amount)}</td>
      <td style="font-family:'DM Mono',monospace;text-align:right;color:${diffColor(d.amount,prev?.amount)};font-size:11px">${diffStr(d.amount,prev?.amount)}</td>
    </tr>`;
  });
  html+=`</tbody></table></div>`;
  return html;
}

function createSupplierCharts(){
  const data=dashInvData.supplier||[];
  const latest=getLatestDate(data);
  const top10=[...data.filter(d=>d.date===latest)].sort((a,b)=>(b.amount||0)-(a.amount||0)).slice(0,10);
  mkChart('chartSupplier',{type:'bar',data:{
    labels:top10.map(d=>d.supplier_name),
    datasets:[{label:'재고금액',data:top10.map(d=>d.amount||0),backgroundColor:CHART_COLORS.map(c=>c+'33'),borderColor:CHART_COLORS,borderWidth:1.5,borderRadius:4}]
  },options:{indexAxis:'y',responsive:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${fmt(ctx.raw)}원`}}},scales:{x:{ticks:{callback:v=>fmt(v),font:{size:9}},grid:{color:'rgba(0,0,0,.05)'}},y:{ticks:{font:{size:10}}}}}});
}

// ── 대시보드 캘린더 ──
function renderDashCal(){
  if(currentNav!=='dash-cal')return;
  const events=dashCalData?.events||[];
  const weekDates=getWeekDates();
  const monthCells=getMonthCells();
  const thisMonth=events.filter(e=>{const d=new Date(e.date);return d.getFullYear()===todayD.getFullYear()&&d.getMonth()===todayD.getMonth();});

  let html=`<div style="animation:fadeUp .3s ease">
  <div class="page-header" style="--page-color:var(--c-schedule)">
    <div><div class="page-category-tag">DASHBOARD</div><div class="page-title">일정 현황</div></div>
    <button class="refresh-btn" onclick="loadCalendar()">↻ 새로고침</button>
  </div>`;

  if(dashCalLoading){html+=`<div class="load-box"><div class="spinner"></div><div>Google Calendar에서 일정을 불러오는 중...</div></div></div>`;document.getElementById('mainArea').innerHTML=html;return;}

  html+=`<div class="meta-row">
    <span class="meta-tag">📅 ${todayD.getFullYear()}년 ${todayD.getMonth()+1}월</span>
    <span class="meta-tag" style="color:var(--c-schedule)">● ${thisMonth.length}건</span>
  </div>
  <div class="cal-header">
    <div class="legend">
      ${Object.entries(typeColor).map(([t,c])=>`<div class="legend-item"><div class="legend-dot" style="background:${c}"></div>${t}</div>`).join('')}
      <div class="legend-sep"></div>
      ${Object.entries(calColor).map(([t,c])=>`<div class="legend-item"><div class="legend-dot" style="background:${c};border-radius:50%"></div>${t}</div>`).join('')}
    </div>
    <div class="view-btns">
      <button class="view-btn ${calView==='week'?'active':''}" onclick="calView='week';renderDashCal()">주간</button>
      <button class="view-btn ${calView==='month'?'active':''}" onclick="calView='month';renderDashCal()">월간</button>
    </div>
  </div>`;

  if(calView==='week'){
    html+=`<div class="week-grid">`;
    weekDates.forEach((date,i)=>{
      const isToday=date.toDateString()===todayD.toDateString();
      const dayEvs=getEventsForDate(date,events);
      html+=`<div class="week-col ${isToday?'today':''}">
        <div class="week-day">${dayNames[i]}</div>
        <div class="week-date">${date.getDate()}</div>`;
      dayEvs.forEach(e=>{
        const c=typeColor[e.type]||'#7a8299';
        html+=`<div class="ev-pill" style="background:${c}22;border-left-color:${c};color:${c}">
          <div class="ev-title-t">${e.title}</div>
          ${e.startTime?`<div class="ev-time">${e.startTime}</div>`:''}
        </div>`;
      });
      html+=`</div>`;
    });
    html+=`</div>`;
  } else {
    html+=`<div class="month-day-names">${dayNames.map(d=>`<div class="month-day-name">${d}</div>`).join('')}</div>
    <div class="month-grid">`;
    monthCells.forEach((day,i)=>{
      if(!day){html+=`<div></div>`;return;}
      const date=new Date(todayD.getFullYear(),todayD.getMonth(),day);
      const isToday=day===todayD.getDate();
      const dayEvs=getEventsForDate(date,events);
      html+=`<div class="month-cell ${isToday?'today':''}">
        <div class="month-cell-day">${day}</div>`;
      dayEvs.slice(0,2).forEach(e=>{
        const c=typeColor[e.type]||'#7a8299';
        html+=`<div class="month-ev" style="background:${c}20;border-left-color:${c};color:${c}">${e.title}</div>`;
      });
      if(dayEvs.length>2)html+=`<div class="month-more">+${dayEvs.length-2}</div>`;
      html+=`</div>`;
    });
    html+=`</div>`;
  }

  html+=`<div class="ev-list"><div class="ev-list-title">이번 달 전체 일정</div>`;
  const sorted=[...thisMonth].sort((a,b)=>a.date.localeCompare(b.date));
  if(!sorted.length)html+=`<div style="color:var(--dim);font-size:12px;padding:20px 0">등록된 일정이 없습니다</div>`;
  sorted.forEach(e=>{
    const tc=typeColor[e.type]||'#7a8299',cc=calColor[e.calendar]||'#7a8299';
    html+=`<div class="ev-list-item" style="border-left:3px solid ${tc}">
      <span class="ev-list-date">${e.date.slice(5)}</span>
      <span class="ev-list-title-text">${e.title}</span>
      <span class="ev-badge" style="background:${tc}20;color:${tc}">${e.type}</span>
      <span class="ev-badge" style="background:${cc}20;color:${cc}">${e.calendar}</span>
    </div>`;
  });
  html+=`</div></div>`;
  document.getElementById('mainArea').innerHTML=html;
}

// ── 툴 페이지 ──
const META={
  all:{label:'ALL TOOLS',title:'모든 툴',color:'var(--accent)'},
  mugu:{label:'MUGU',title:'문구',color:'var(--c-mugu)'},
  music:{label:'MUSIC',title:'음반',color:'var(--c-music)'},
  etc:{label:'ETC',title:'기타',color:'var(--c-etc)'},
  settle:{label:'ETC · 정산',title:'정산',color:'var(--c-settle)'},
  jryo:{label:'ETC · 자료',title:'자료',color:'var(--c-data)'},
  analysis:{label:'ETC · 분석',title:'분석',color:'var(--c-analysis)'},
  schedule:{label:'ETC · 일정',title:'일정',color:'var(--c-schedule)'},
};

function getFiltered(key){
  if(key==='all')return TOOLS;
  if(key==='etc')return TOOLS.filter(t=>t.cat==='etc');
  if(['settle','jryo','analysis','schedule'].includes(key))return TOOLS.filter(t=>t.subcat===key);
  return TOOLS.filter(t=>t.cat===key);
}

function renderToolPage(key){
  const m=META[key]||META.all;
  const tools=getFiltered(key);
  const recentTools=recentIds.map(id=>TOOLS.find(t=>t.id===id)).filter(Boolean);
  let html='';

  if(recentTools.length){
    html+=`<div class="recent-bar"><span class="recent-label">RECENT</span><div class="recent-chips">`;
    recentTools.forEach(t=>{html+=`<div class="recent-chip" onclick="openTool('${t.id}')"><span class="rc-dot" style="background:${t.color}"></span>${t.title}</div>`;});
    html+=`</div></div>`;
  }

  html+=`<div class="page-header" style="--page-color:${m.color}">
    <div><div class="page-category-tag">${m.label}</div><div class="page-title">${m.title}</div></div>
    <span class="page-tool-count">${tools.length} tools</span>
  </div>`;

  if(!tools.length){html+=`<div class="empty-state">📭<br><br>등록된 툴이 없습니다</div>`;document.getElementById('mainArea').innerHTML=html;return;}

  if(key==='all'){
    html+=renderGrouped([
      {label:'문구',color:'var(--c-mugu)',items:TOOLS.filter(t=>t.cat==='mugu')},
      {label:'음반',color:'var(--c-music)',items:TOOLS.filter(t=>t.cat==='music')},
      {label:'기타 · 정산',color:'var(--c-settle)',items:TOOLS.filter(t=>t.subcat==='settle')},
      {label:'기타 · 자료',color:'var(--c-data)',items:TOOLS.filter(t=>t.subcat==='jryo')},
      {label:'기타 · 분석',color:'var(--c-analysis)',items:TOOLS.filter(t=>t.subcat==='analysis')},
      {label:'기타 · 일정',color:'var(--c-schedule)',items:TOOLS.filter(t=>t.subcat==='schedule')},
    ]);
  } else if(key==='etc'){
    html+=renderGrouped([
      {label:'정산',color:'var(--c-settle)',items:TOOLS.filter(t=>t.subcat==='settle')},
      {label:'자료',color:'var(--c-data)',items:TOOLS.filter(t=>t.subcat==='jryo')},
      {label:'분석',color:'var(--c-analysis)',items:TOOLS.filter(t=>t.subcat==='analysis')},
      {label:'일정',color:'var(--c-schedule)',items:TOOLS.filter(t=>t.subcat==='schedule')},
    ]);
  } else {
    html+=`<div class="tools-grid">`;
    tools.forEach((t,i)=>{html+=cardHTML(t,i);});
    html+=`<div class="add-card" onclick="alert('툴 HTML 파일을 같은 폴더에 넣고 TOOLS 배열에 file 경로를 추가하세요.')"><span style="font-size:20px">＋</span><span>툴 추가</span></div>`;
    html+=`</div>`;
  }
  document.getElementById('mainArea').innerHTML=html;
}

function renderGrouped(groups){
  let html='';
  groups.forEach(g=>{
    if(!g.items.length)return;
    html+=`<div class="sub-section">
      <div class="sub-section-header">
        <span class="sub-section-dot" style="background:${g.color};box-shadow:0 0 6px ${g.color}"></span>
        <span class="sub-section-title">${g.label}</span>
        <span class="sub-section-count">${g.items.length} tools</span>
      </div><div class="tools-grid">`;
    g.items.forEach((t,i)=>{html+=cardHTML(t,i);});
    html+=`</div></div>`;
  });
  return html;
}

function cardHTML(t,i){
  const isLinked=!!t.file;
  const bm={new:'badge-new NEW',update:'badge-update UPDATE',stable:'badge-stable STABLE',linked:'badge-linked ●연결됨'};
  const[bc,bl]=(bm[t.badge]||'badge-stable STABLE').split(' ');
  return `<div class="tool-card ${isLinked?'linked':''}" style="--card-color:${t.color};--icon-bg:${t.iconbg};animation-delay:${i*.04}s" onclick="openTool('${t.id}')">
    <div class="card-icon">${t.icon}</div>
    <div class="card-cat">${isLinked?'● CONNECTED':'TOOL'}</div>
    <div class="card-title">${t.title}</div>
    <div class="card-desc">${t.desc}</div>
    <div class="card-footer"><span class="card-date">${t.updated}</span><span class="card-badge ${bc}">${bl}</span></div>
  </div>`;
}

function selectNav(key,el){
  currentNav=key;
  document.querySelectorAll('.nav-item,.nav-sub-item').forEach(n=>n.classList.remove('active'));
  el.classList.add('active');
  if(['settle','jryo','analysis','schedule'].includes(key)){
    document.getElementById('nav-etc').classList.add('active');
    document.getElementById('sub-etc').classList.add('open');
    document.getElementById('nav-etc').classList.add('etc-open');
  }
  if(key==='dash-inv')renderDashInv();
  else if(key==='dash-cal')renderDashCal();
  else renderToolPage(key);
  if(window.innerWidth<768)closeSidebar();
}

function toggleEtc(el){
  document.getElementById('sub-etc').classList.toggle('open');
  el.classList.toggle('etc-open');el.classList.toggle('active');
}

function handleSearch(){
  const q=document.getElementById('searchInput').value.trim().toLowerCase();
  if(!q){
    if(currentNav==='dash-inv')renderDashInv();
    else if(currentNav==='dash-cal')renderDashCal();
    else renderToolPage(currentNav);
    return;
  }
  const results=TOOLS.filter(t=>t.title.toLowerCase().includes(q)||t.desc.toLowerCase().includes(q));
  let html=`<div class="page-header">
    <div><div class="page-category-tag" style="color:var(--accent)">SEARCH</div>
    <div class="page-title">"${q}" 검색 결과</div></div>
    <span class="page-tool-count">${results.length}건</span></div>`;
  if(!results.length)html+=`<div class="empty-state">🔍<br><br>검색 결과 없음</div>`;
  else{html+=`<div class="tools-grid">`;results.forEach((t,i)=>{html+=cardHTML(t,i);});html+=`</div>`;}
  document.getElementById('mainArea').innerHTML=html;
}

window.onload=()=>{
  const d=new Date();
  document.getElementById('topDate').textContent=
    d.getFullYear()+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+String(d.getDate()).padStart(2,'0');
  const c={all:0,mugu:0,music:0,etc:0,settle:0,jryo:0,analysis:0,schedule:0};
  TOOLS.forEach(t=>{c.all++;c[t.cat]++;if(t.subcat)c[t.subcat]++;});
  Object.keys(c).forEach(k=>{const el=document.getElementById('cnt-'+k);if(el)el.textContent=c[k];});
  loadInventory();loadCalendar();
  renderDashInv();
};
</script>
</body>
